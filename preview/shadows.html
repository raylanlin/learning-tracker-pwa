<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Shadows</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .card-root { padding: 28px; }
  .wrap {
    background: var(--card);
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 18px rgba(0,0,0,0.04);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .slot {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 18px 10px 14px;
    border-radius: 14px;
    background: #fafafc;
  }
  .puck {
    width: 64px; height: 40px; border-radius: 12px; background: #fff;
  }
  .slot.card   .puck { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .slot.mini   .puck { box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
  .slot.fab    .puck { background: #007aff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,122,255,0.4); }
  .slot.ring   .puck { background: #ffcc00; width: 40px; height: 40px; border-radius: 12px; box-shadow: 0 0 0 3px rgba(255,204,0,0.35); }

  .name { font-size: 12px; font-weight: 600; color: var(--fg1); }
  .val  { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10px; color: var(--fg2); text-align: center; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="card-root">
  <div class="wrap">
    <div class="slot card">
      <div class="puck"></div>
      <div class="name">Card</div>
      <div class="val">0 · 2 · 12<br/>rgba(0,0,0,.08)</div>
    </div>
    <div class="slot mini">
      <div class="puck"></div>
      <div class="name">Mini</div>
      <div class="val">0 · 1 · 6<br/>rgba(0,0,0,.08)</div>
    </div>
    <div class="slot fab">
      <div class="puck"></div>
      <div class="name">FAB</div>
      <div class="val">0 · 4 · 20<br/>blue @ 40%</div>
    </div>
    <div class="slot ring">
      <div class="puck"></div>
      <div class="name">Today</div>
      <div class="val">0 · 0 · 0 · 3<br/>yellow @ 35%</div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Task Card</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .task-card { background: #fff; border-radius: 16px; box-shadow: var(--shadow-card); overflow: hidden; }
  .task-header { padding: 16px; display:flex; align-items:center; justify-content:space-between; }
  .task-name { font-size: 17px; font-weight: 600; color: #1c1c1e; }
  .task-meta { font-size: 12px; color: #8e8e93; margin-top: 4px; display:flex; align-items:center; gap: 8px; }
  .progress-bar-wrap { width: 60px; height: 4px; background: #d5d5dc; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #3ec177; border-radius: 2px; width: 60%; }
  .chev { width: 20px; height: 20px; opacity: 0.4; }
  .today-pill { color: #f5b740; font-weight: 700; }
  .bonus-pill { color: #a668e0; font-weight: 700; }
</style>
</head>
<body>
<div class="card-root">
  <div class="task-card">
    <div class="task-header">
      <div>
        <div class="task-name">阅读英文原版</div>
        <div class="task-meta">
          <span>18 / 30</span>
          <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
          <span class="today-pill">●2</span>
          <span style="color:#8e8e93;">2 个子任务</span>
        </div>
      </div>
      <svg class="chev" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
</div>
</body>
</html>

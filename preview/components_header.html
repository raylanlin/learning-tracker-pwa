<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>App Header</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .card-root { padding: 0; }
  .mock { padding: 40px 16px 60px; background: linear-gradient(180deg, #e8e8ec 0%, #f7f7f9 100%); min-height: 280px; }
  header { position: sticky; top: 0; background: rgba(242,242,247,0.85); backdrop-filter: blur(20px); padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-radius: 16px 16px 0 0; }
  header h1 { font-size: 22px; font-weight: 700; margin: 0; }
  .date { font-size: 13px; color: #8a8a92; font-weight: 500; }
  .content { background: #fff; padding: 20px; border-radius: 0 0 16px 16px; font-size: 14px; color: #8a8a92; }
  .sync-status { position: absolute; top: 72px; right: 32px; font-size: 10px; padding: 3px 8px; border-radius: 8px; background: #fff; color: #8a8a92; box-shadow: 0 1px 6px rgba(0,0,0,0.08); font-weight: 600; }
  .cap { font-size: 11px; color: #8a8a92; text-align: center; margin-top: 12px; }
</style>
</head>
<body>
<div class="card-root">
  <div style="position: relative;">
    <header>
      <h1>学习追踪</h1>
      <span class="date">4月18日 周五</span>
    </header>
    <span class="sync-status">● 在线</span>
    <div class="content">Sticky frosted header · 20 px blur · 85 % tint of bg</div>
  </div>
  <div class="cap">Only glass surface in the app</div>
</div>
</body>
</html>

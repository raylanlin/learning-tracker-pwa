<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Neutrals</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .scale {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: var(--card);
    border-radius: 12px;
    padding: 14px;
    box-shadow: var(--shadow-md);
  }
  .n-swatch {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-start;
  }
  .n-chip {
    width: 100%;
    height: 64px;
    border-radius: 10px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
  }
  .n-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--fg1);
  }
  .n-hex {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 11px;
    color: var(--fg2);
  }
</style>
</head>
<body>
<div class="card-root">
  <div class="scale">
    <div class="n-swatch">
      <div class="n-chip" style="background:#f7f7f9"></div>
      <div class="n-name">bg</div>
      <div class="n-hex">#F7F7F9</div>
    </div>
    <div class="n-swatch">
      <div class="n-chip" style="background:#eceef2"></div>
      <div class="n-name">bg-elev</div>
      <div class="n-hex">#ECEEF2</div>
    </div>
    <div class="n-swatch">
      <div class="n-chip" style="background:#ffffff"></div>
      <div class="n-name">card</div>
      <div class="n-hex">#FFFFFF</div>
    </div>
    <div class="n-swatch">
      <div class="n-chip" style="background:#ececf0"></div>
      <div class="n-name">border</div>
      <div class="n-hex">#ECECF0</div>
    </div>
    <div class="n-swatch">
      <div class="n-chip" style="background:#dcdce3"></div>
      <div class="n-name">border-strong</div>
      <div class="n-hex">#DCDCE3</div>
    </div>
    <div class="n-swatch">
      <div class="n-chip" style="background:#b4b4bc"></div>
      <div class="n-name">text-tertiary</div>
      <div class="n-hex">#B4B4BC</div>
    </div>
    <div class="n-swatch">
      <div class="n-chip" style="background:#8a8a92"></div>
      <div class="n-name">text-secondary</div>
      <div class="n-hex">#8A8A92</div>
    </div>
    <div class="n-swatch">
      <div class="n-chip" style="background:#1c1c1e"></div>
      <div class="n-name">text-primary</div>
      <div class="n-hex">#1C1C1E</div>
    </div>
  </div>
</div>
</body>
</html>

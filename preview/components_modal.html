<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Modal</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .card-root { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), #f2f2f7; display:flex; align-items:center; justify-content:center; padding: 32px; }
  .modal { background: #fff; border-radius: 20px; width: 100%; max-width: 340px; padding: 24px 20px 20px; }
  .modal h2 { font-size: 18px; font-weight: 700; text-align: center; margin: 0 0 16px; color: #1c1c1e; }
  .modal input { width: 100%; border: 1.5px solid #e5e5ea; border-radius: 12px; padding: 12px 14px; font-size: 16px; background: #f2f2f7; outline: none; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
  .btns { display: flex; gap: 10px; margin-top: 6px; }
  .btns button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; font-family: inherit; }
  .cancel { background: #f2f2f7; color: #1c1c1e; }
  .confirm { background: #007aff; color: #fff; }
</style>
</head>
<body>
<div class="card-root">
  <div class="modal">
    <h2>新建任务</h2>
    <input placeholder="任务名称…" />
    <div class="btns">
      <button class="cancel">取消</button>
      <button class="confirm">确认</button>
    </div>
  </div>
</div>
</body>
</html>

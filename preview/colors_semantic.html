<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Primary Colors</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .card-root { padding: 28px; background: #fafafc; }
  .swatches {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .swatch {
    position: relative;
    border-radius: 16px;
    padding: 14px 14px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.04);
  }
  /* gentle tinted wash, much softer than before */
  .swatch::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--tint);
    opacity: 0.04;
    border-radius: inherit;
    pointer-events: none;
  }
  .chip {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    flex-shrink: 0;
    background: var(--tint);
    /* gentle inner highlight + faint tinted rim, no drop shadow */
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    position: relative;
  }
  .meta {
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
    min-width: 0;
  }
  .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--fg1);
    letter-spacing: -0.005em;
  }
  .hex {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 10.5px;
    color: var(--fg2);
  }
  .use {
    font-size: 11px;
    color: var(--fg2);
    line-height: 1.3;
    margin-top: 1px;
  }
</style>
</head>
<body>
<div class="card-root">
  <div class="swatches">
    <div class="swatch" style="--tint:#007aff;">
      <div class="chip"></div>
      <div class="meta">
        <div class="name">Accent</div>
        <div class="hex">#007AFF</div>
        <div class="use">Primary · today</div>
      </div>
    </div>
    <div class="swatch" style="--tint:#34c759;">
      <div class="chip"></div>
      <div class="meta">
        <div class="name">Green</div>
        <div class="hex">#34C759</div>
        <div class="use">Complete</div>
      </div>
    </div>
    <div class="swatch" style="--tint:#ffcc00;">
      <div class="chip"></div>
      <div class="meta">
        <div class="name">Yellow</div>
        <div class="hex">#FFCC00</div>
        <div class="use">Today · selected</div>
      </div>
    </div>
    <div class="swatch" style="--tint:#af52de;">
      <div class="chip"></div>
      <div class="meta">
        <div class="name">Purple</div>
        <div class="hex">#AF52DE</div>
        <div class="use">Bonus (&gt;30)</div>
      </div>
    </div>
    <div class="swatch" style="--tint:#ff3b30;">
      <div class="chip"></div>
      <div class="meta">
        <div class="name">Red</div>
        <div class="hex">#FF3B30</div>
        <div class="use">Destructive</div>
      </div>
    </div>
    <div class="swatch" style="--tint:#ff9500;">
      <div class="chip"></div>
      <div class="meta">
        <div class="name">Orange</div>
        <div class="hex">#FF9500</div>
        <div class="use">Offline</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Calendar Day</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .wrap { background: #fff; border-radius: 16px; padding: 18px; box-shadow: var(--shadow-card); }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #8a8a92; font-weight: 600; padding-bottom: 8px; }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day { aspect-ratio: 1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius: 12px; font-size: 15px; font-weight: 500; color: #1c1c1e; position: relative; }
  .other { color: #dcdce3; }
  .today { background: #4a7dff; color: #fff; font-weight: 700; }
  .selected { background: #f5b740; color: #1c1c1e; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #3ec177; position: absolute; bottom: 4px; }
  .today .dot { background: #fff; }
</style>
</head>
<body>
<div class="card-root">
  <div class="wrap">
    <div class="weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
    <div class="days">
      <div class="day other">30</div><div class="day other">31</div>
      <div class="day">1</div><div class="day">2<div class="dot"></div></div><div class="day">3</div>
      <div class="day">4<div class="dot"></div></div><div class="day">5</div>
      <div class="day">6</div><div class="day">7<div class="dot"></div></div>
      <div class="day">8</div><div class="day">9<div class="dot"></div></div>
      <div class="day selected">10</div><div class="day">11</div><div class="day">12</div>
      <div class="day">13</div><div class="day">14<div class="dot"></div></div>
      <div class="day">15</div><div class="day">16</div><div class="day">17<div class="dot"></div></div>
      <div class="day today">18<div class="dot"></div></div><div class="day">19</div>
    </div>
  </div>
</div>
</body>
</html>

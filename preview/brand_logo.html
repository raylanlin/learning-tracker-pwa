<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Logo</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .wrap { background: #fff; border-radius: 16px; padding: 24px; box-shadow: var(--shadow-card); display: flex; gap: 24px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .icon-big { width: 128px; height: 128px; }
  .icon-sm { width: 48px; height: 48px; }
  .icon-xs { width: 28px; height: 28px; }
  .stack { display:flex; flex-direction:column; gap: 4px; align-items: center; }
  .cap { font-size: 11px; color: #8a8a92; font-weight: 600; }
</style>
</head>
<body>
<div class="card-root">
  <div class="wrap">
    <div class="stack"><img class="icon-big" src="../assets/icon-512.svg" alt=""/><div class="cap">512</div></div>
    <div class="stack"><img class="icon-sm" src="../assets/icon-512.svg" alt=""/><div class="cap">48</div></div>
    <div class="stack"><img class="icon-xs" src="../assets/icon-512.svg" alt=""/><div class="cap">28</div></div>
  </div>
</div>
</body>
</html>

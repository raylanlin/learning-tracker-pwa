<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Radii</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .card-root { padding: 24px; }
  .wrap {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 18px rgba(0,0,0,0.04);
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }
  .slot {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    padding: 12px 8px 10px;
    background: #fafafc;
    border-radius: 14px;
  }
  .demo {
    width: 62px; height: 62px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 600;
  }
  .r-sm  { border-radius: 8px;  background: #8e8e93; }
  .r-md  { border-radius: 12px; background: #34c759; }
  .r-in  { border-radius: 14px; background: #007aff; }
  .r-cd  { border-radius: 16px; background: #1c1c1e; }
  .r-mo  { border-radius: 20px; background: #af52de; }
  .r-ax  { border-radius: 24px; background: #ff9500; }

  .lbl { font-size: 12px; font-weight: 600; color: var(--fg1); }
  .px  { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10px; color: var(--fg2); }
  .use { font-size: 10px; color: var(--fg2); text-align: center; line-height: 1.3; }
</style>
</head>
<body>
<div class="card-root">
  <div class="wrap">
    <div class="slot">
      <div class="demo r-sm">Aa</div>
      <div class="lbl">sm</div>
      <div class="px">8 px</div>
      <div class="use">subtask cell · pill button</div>
    </div>
    <div class="slot">
      <div class="demo r-md">Aa</div>
      <div class="lbl">md</div>
      <div class="px">12 px</div>
      <div class="use">tab bar · input · chip</div>
    </div>
    <div class="slot">
      <div class="demo r-in">Aa</div>
      <div class="lbl">input</div>
      <div class="px">14 px</div>
      <div class="use">auth input · primary btn</div>
    </div>
    <div class="slot">
      <div class="demo r-cd">Aa</div>
      <div class="lbl">card</div>
      <div class="px">16 px</div>
      <div class="use">default surface</div>
    </div>
    <div class="slot">
      <div class="demo r-mo">Aa</div>
      <div class="lbl">modal</div>
      <div class="px">20 px</div>
      <div class="use">sheet · dialog</div>
    </div>
    <div class="slot">
      <div class="demo r-ax">Aa</div>
      <div class="lbl">xl</div>
      <div class="px">24 px</div>
      <div class="use">auth card · FAB pill</div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>FAB</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .wrap { background: var(--card); border-radius: 16px; padding: 40px 20px; box-shadow: var(--shadow-card); display: flex; justify-content: center; gap: 24px; align-items: center; }
  .fab { border: none; border-radius: 24px; padding: 14px 28px; font-size: 16px; font-weight: 600; background: #007aff; color:#fff; box-shadow: 0 4px 20px rgba(0,122,255,.4); display:flex; align-items: center; gap: 6px; font-family: inherit; }
  .cap { font-size: 11px; color: var(--fg2); text-align: center; }
</style>
</head>
<body>
<div class="card-root">
  <div class="wrap">
    <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
      <button class="fab">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
        添加任务
      </button>
      <div class="cap">Grid tab FAB</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
      <button class="fab">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
        添加计划
      </button>
      <div class="cap">Calendar tab FAB</div>
    </div>
  </div>
</div>
</body>
</html>

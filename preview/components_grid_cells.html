<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Progress Cells</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .wrap { background: var(--card); border-radius: 16px; padding: 18px; box-shadow: var(--shadow-card); }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #8a8a92; font-weight: 500; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .cell { aspect-ratio: 1; border-radius: 8px; display:flex; align-items:center; justify-content:center; font-size: 10px; font-weight: 500; }
  .pending { background: #dcdce3; color: #8a8a92; }
  .done { background: #3ec177; color: #fff; }
  .today { background: #f5b740; color: #1c1c1e; box-shadow: 0 0 0 2px rgba(255,204,0,0.35); }
  .bonus { background: #a668e0; color: #fff; }
</style>
</head>
<body>
<div class="card-root">
  <div class="wrap">
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background:#dcdce3"></div>未完成</div>
      <div class="legend-item"><div class="dot" style="background:#3ec177"></div>已完成</div>
      <div class="legend-item"><div class="dot" style="background:#f5b740"></div>今日</div>
      <div class="legend-item"><div class="dot" style="background:#a668e0"></div>超额（&gt;30）</div>
    </div>
    <div class="grid">
      <div class="cell done">1</div><div class="cell done">2</div><div class="cell done">3</div>
      <div class="cell done">4</div><div class="cell done">5</div><div class="cell done">6</div>
      <div class="cell done">7</div><div class="cell today">8</div><div class="cell today">9</div>
      <div class="cell pending">10</div>
      <div class="cell pending">11</div><div class="cell pending">12</div><div class="cell pending">13</div>
      <div class="cell pending">14</div><div class="cell pending">15</div><div class="cell pending">16</div>
      <div class="cell pending">17</div><div class="cell pending">18</div><div class="cell pending">19</div>
      <div class="cell pending">20</div>
      <div class="cell bonus">31</div><div class="cell bonus">32</div>
      <div class="cell pending">33</div><div class="cell pending">34</div><div class="cell pending">35</div>
      <div class="cell pending">36</div><div class="cell pending">37</div><div class="cell pending">38</div>
      <div class="cell pending">39</div><div class="cell pending">40</div>
    </div>
  </div>
</div>
</body>
</html>

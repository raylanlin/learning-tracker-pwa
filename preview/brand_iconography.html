<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Iconography</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .wrap { background: #fff; border-radius: 16px; padding: 20px; box-shadow: var(--shadow-card); display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .slot { display:flex; flex-direction: column; align-items: center; gap: 6px; }
  .slot .g { width: 36px; height: 36px; display:flex; align-items:center; justify-content:center; color:#1c1c1e; font-size: 20px; }
  .slot .blue { color: #007aff; }
  .cap { font-size: 10px; color: #8e8e93; font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
</style>
</head>
<body>
<div class="card-root">
  <div class="wrap">
    <div class="slot"><div class="g"><svg width="22" height="22" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#007aff" stroke-width="2.2" stroke-linecap="round"/></svg></div><div class="cap">plus</div></div>
    <div class="slot"><div class="g"><svg width="22" height="22" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="#1c1c1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="cap">chevron</div></div>
    <div class="slot"><div class="g blue">◀</div><div class="cap">prev</div></div>
    <div class="slot"><div class="g blue">▶</div><div class="cap">next</div></div>
    <div class="slot"><div class="g" style="color:#34c759">●</div><div class="cap">dot</div></div>
    <div class="slot"><div class="g" style="color:#ff3b30; font-size:24px;">×</div><div class="cap">close</div></div>
    <div class="slot"><div class="g">📅</div><div class="cap">cal emoji</div></div>
    <div class="slot"><div class="g">🔲</div><div class="cap">grid emoji</div></div>
    <div class="slot"><div class="g">📚</div><div class="cap">empty</div></div>
    <div class="slot"><div class="g">☁️</div><div class="cap">cloud</div></div>
    <div class="slot"><div class="g" style="color:#ff9500">⏳</div><div class="cap">syncing</div></div>
    <div class="slot"><div class="g" style="color:#ff3b30">⚠</div><div class="cap">error</div></div>
  </div>
</div>
</body>
</html>

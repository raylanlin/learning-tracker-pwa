<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Spacing</title>
<link rel="stylesheet" href="_base.css" />
<style>
  .stack { display: flex; flex-direction: column; gap: 10px; background: var(--card); padding: 16px; border-radius: 16px; box-shadow: var(--shadow-card); }
  .row { display: grid; grid-template-columns: 60px 1fr 80px; align-items: center; gap: 12px; }
  .token { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--fg1); font-weight:600; }
  .bar { height: 14px; background: #007aff; border-radius: 4px; }
  .val { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--fg2); text-align: right; }
</style>
</head>
<body>
<div class="card-root">
  <div class="stack">
    <div class="row"><span class="token">--space-1</span><div class="bar" style="width:4px"></div><span class="val">4 px</span></div>
    <div class="row"><span class="token">--space-2</span><div class="bar" style="width:8px"></div><span class="val">8 px</span></div>
    <div class="row"><span class="token">--space-3</span><div class="bar" style="width:12px"></div><span class="val">12 px</span></div>
    <div class="row"><span class="token">--space-4</span><div class="bar" style="width:16px"></div><span class="val">16 px</span></div>
    <div class="row"><span class="token">--space-5</span><div class="bar" style="width:20px"></div><span class="val">20 px</span></div>
    <div class="row"><span class="token">--space-6</span><div class="bar" style="width:24px"></div><span class="val">24 px</span></div>
    <div class="row"><span class="token">--space-8</span><div class="bar" style="width:32px"></div><span class="val">32 px</span></div>
    <div class="row"><span class="token">--space-10</span><div class="bar" style="width:40px"></div><span class="val">40 px</span></div>
  </div>
</div>
</body>
</html>

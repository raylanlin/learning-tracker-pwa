<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- v5 -->
  <meta charset="UTF-8" />
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#fafafc" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#15151a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>学习追踪</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
  <link rel="icon" type="image/svg+xml" href="icon-512.svg" />
  <script>
    // Apply theme ASAP to prevent flash-of-wrong-theme
    (function() {
      try {
        var saved = localStorage.getItem('lt_theme') || 'auto';
        document.documentElement.setAttribute('data-theme', saved);
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        var sync = function() {
          document.documentElement.setAttribute('data-system-dark', mq.matches ? '1' : '0');
        };
        sync();
        mq.addEventListener ? mq.addEventListener('change', sync) : mq.addListener(sync);
      } catch(e) {}
    })();
  </script>
  <style>
    /* ============================================================
       学习追踪 — v5 polish
       - softer palette, tighter spacing system, unified motion
       - auto dark mode (prefers-color-scheme)
       - press feedback on all interactive surfaces
       ============================================================ */
    :root {
      /* neutrals */
      --bg: #fafafc;
      --bg-elev: #f2f2f7;
      --card: #ffffff;
      --border: #e8e8ed;
      --border-strong: #d5d5dc;

      /* text */
      --text-primary: #1c1c1e;
      --text-secondary: #8e8e93;
      --text-tertiary: #aeaeb2;

      /* brand + accents (softer than iOS system) */
      --accent: #4a7dff;
      --accent-soft: #e8efff;
      --accent-ink: #2d5fe0;
      --green: #3ec177;
      --green-soft: #e2f5ea;
      --yellow: #f5b740;
      --yellow-soft: #fff4dc;
      --purple: #a668e0;
      --purple-soft: #f1e7fb;
      --red: #e5564b;
      --red-soft: #fde9e7;
      --orange: #ef8a3d;

      /* grid cell neutral */
      --cell-pending: #e5e5ea;

      /* elevation */
      --shadow-sm: 0 1px 2px rgba(20, 20, 30, 0.04), 0 1px 1px rgba(20, 20, 30, 0.03);
      --shadow-md: 0 2px 8px rgba(20, 20, 30, 0.05), 0 1px 2px rgba(20, 20, 30, 0.03);
      --shadow-lg: 0 8px 28px rgba(20, 20, 30, 0.08), 0 2px 6px rgba(20, 20, 30, 0.04);
      --shadow-fab: 0 6px 20px rgba(74, 125, 255, 0.32), 0 2px 6px rgba(74, 125, 255, 0.18);

      /* radius */
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-pill: 999px;

      /* motion */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --t-fast: 0.15s;
      --t-med: 0.2s;
      --t-slow: 0.32s;
    }

    /* Dark theme — activated via html[data-theme="dark"] or system pref when data-theme="auto" */
    html[data-theme="dark"], html[data-theme="auto"][data-system-dark="1"] {
      --bg: #0f0f12;
      --bg-elev: #1c1c21;
      --card: #1a1a1f;
      --border: #26262c;
      --border-strong: #33333a;

      --text-primary: #f2f2f5;
      --text-secondary: #8f8f99;
      --text-tertiary: #5c5c66;

      --accent: #6a94ff;
      --accent-soft: #1d2a4a;
      --accent-ink: #9db7ff;
      --green: #4fcc88;
      --green-soft: #15301f;
      --yellow: #f5b740;
      --yellow-soft: #332811;
      --purple: #b880ea;
      --purple-soft: #2a1c3a;
      --red: #ef685c;
      --red-soft: #3a1a17;

      --cell-pending: #26262c;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.5);
      --shadow-fab: 0 6px 20px rgba(106, 148, 255, 0.4);
    }

    /* Theme menu */
    .theme-menu-wrap { position: relative; }
    .theme-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-md); box-shadow: var(--shadow-lg);
      min-width: 132px; padding: 4px; z-index: 110;
      opacity: 0; transform: translateY(-4px) scale(0.98); pointer-events: none;
      transition: opacity var(--t-fast) var(--ease-out), transform var(--t-med) var(--ease-spring);
    }
    .theme-menu.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .theme-opt {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 8px 10px; border: none; background: transparent;
      font-size: 13px; color: var(--text-primary); cursor: pointer;
      border-radius: 8px; text-align: left;
    }
    .theme-opt:hover { background: var(--bg-elev); }
    .theme-opt .t-check { margin-left: auto; color: var(--accent); opacity: 0; }
    .theme-opt.sel .t-check { opacity: 1; }
    .theme-opt svg { width: 14px; height: 14px; color: var(--text-secondary); }

    /* ── User Menu ── */
    #userMenu { min-width: 180px; }
    .menu-label {
      padding: 8px 12px 4px;
      font-size: 11px; font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }
    .menu-divider {
      height: 1px; background: var(--border);
      margin: 4px 8px;
    }
    #userMenu.show .menu-divider {
      opacity: 0; animation: fadeIn 0.3s 0.15s both;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .menu-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 8px 12px; border: none; background: transparent;
      font-size: 13px; color: var(--text-primary); cursor: pointer;
      border-radius: 8px; text-align: left;
      transition: background 0.15s;
    }
    #userMenu.show .menu-item {
      opacity: 0; animation: itemSlideIn 0.2s var(--ease-out) both;
    }
    .menu-item:hover { background: var(--bg-elev); }
    .menu-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .menu-item.export { color: var(--accent); }
    .menu-item.import { color: var(--green); }
    .menu-item.logout { color: var(--red); }
    @keyframes itemSlideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    #userMenu.show .menu-item:nth-child(3) { animation-delay: 0.05s; }
    #userMenu.show .menu-item:nth-child(4) { animation-delay: 0.09s; }
    #userMenu.show .menu-item:nth-child(5) { animation-delay: 0.13s; }
    #userMenu.show .menu-item:nth-child(6) { animation-delay: 0.17s; }
    .menu-item:nth-child(7) { animation-delay: 0.21s; }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { overscroll-behavior-y: none; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: calc(96px + env(safe-area-inset-bottom));
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input { font-family: inherit; }

    /* ── Auth Screen ─────────────────────────────────── */
    .auth-screen {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 24px;
      background: var(--bg);
    }
    .auth-card {
      background: var(--card); border-radius: 24px;
      padding: 36px 28px 28px;
      width: 100%; max-width: 360px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      border: 1px solid var(--border);
    }
    .auth-logo {
      width: 56px; height: 56px; margin: 0 auto 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-ink) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md);
    }
    .auth-logo svg { width: 28px; height: 28px; }
    .auth-card h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
    .auth-card .auth-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
    .auth-field {
      position: relative; margin-bottom: 10px;
    }
    .auth-card input {
      width: 100%;
      border: 1.5px solid var(--border-strong);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color var(--t-med) var(--ease-out), background var(--t-med) var(--ease-out);
      background: var(--bg-elev);
      color: var(--text-primary);
    }
    .auth-card input::placeholder { color: var(--text-tertiary); }
    .auth-card input:focus {
      border-color: var(--accent);
      background: var(--card);
    }
    .auth-card input.invalid {
      border-color: var(--red);
      animation: shake 0.35s var(--ease-out);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .auth-btn {
      width: 100%; border: none; border-radius: 12px; padding: 13px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff;
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
      margin-top: 6px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .auth-btn:active { transform: scale(0.98); background: var(--accent-ink); }
    .auth-btn[disabled] { opacity: 0.7; cursor: not-allowed; }
    .auth-btn .spin {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .auth-btn.loading .spin { display: inline-block; }
    .auth-btn.loading .label { opacity: 0.9; }
    .auth-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 14px; }
    .auth-error {
      font-size: 12px; color: var(--red);
      min-height: 16px; margin: 2px 2px 8px; text-align: left;
      opacity: 0; transition: opacity var(--t-med) var(--ease-out);
    }
    .auth-error.show { opacity: 1; }

    /* ── Header ─────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: saturate(1.6) blur(20px);
      -webkit-backdrop-filter: saturate(1.6) blur(20px);
      padding: calc(12px + env(safe-area-inset-top)) 20px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid transparent;
      transition: border-color var(--t-med) var(--ease-out);
    }
    header.scrolled { border-bottom-color: var(--border); }
    .header-left { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.2px; }
    .header-date {
      font-size: 13px; color: var(--text-secondary); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .sync-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500;
      padding: 4px 9px; border-radius: var(--r-pill);
      background: var(--bg-elev); color: var(--text-secondary);
      transition: all var(--t-med) var(--ease-out);
    }
    .sync-pill .sync-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    }
    .sync-pill.syncing { color: var(--accent-ink); background: var(--accent-soft); }
    .sync-pill.syncing .sync-dot { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .sync-pill.error { color: var(--red); background: var(--red-soft); }
    .sync-pill.error .sync-dot { background: var(--red); }
    .sync-pill.offline { color: var(--orange); background: var(--yellow-soft); }
    .sync-pill.offline .sync-dot { background: var(--orange); }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-elev); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-secondary);
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
      font-size: 13px; font-weight: 700;
      padding: 0; line-height: 1;
    }
    .icon-btn:active { transform: scale(0.92); background: var(--border-strong); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ── Tab Bar ─────────────────────────────────── */
    .tab-bar {
      display: flex; background: var(--bg-elev);
      border-radius: var(--r-md);
      margin: 10px 16px 14px;
      padding: 3px;
      position: relative;
    }
    .tab-btn {
      flex: 1; padding: 8px 0; border: none; background: transparent;
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      cursor: pointer;
      border-radius: 9px;
      transition: color var(--t-med) var(--ease-out);
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      z-index: 1;
    }
    .tab-btn.active { color: var(--text-primary); }
    .tab-indicator {
      position: absolute; top: 3px; bottom: 3px;
      width: calc(25% - 2px);
      background: var(--card);
      border-radius: 9px;
      box-shadow: var(--shadow-sm);
      transition: transform var(--t-slow) var(--ease-out);
    }
    .tab-indicator[data-tab="grid"] { transform: translateX(100%); }
    .tab-indicator[data-tab="stats"] { transform: translateX(200%); }
    .tab-indicator[data-tab="countdown"] { transform: translateX(300%); }
    .tab-btn svg { width: 14px; height: 14px; }

    /* ── Stats page ─────────────────────────────────── */
    .stats-hero {
      background: var(--card); border-radius: var(--r-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow-md);
      padding: 18px 16px 14px; margin-bottom: 12px;
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    }
    .stat-kpi { text-align: center; }
    .stat-kpi .num {
      font-size: 28px; font-weight: 800; letter-spacing: -0.8px;
      color: var(--text-primary); line-height: 1;
    }
    .stat-kpi .num .unit {
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      margin-left: 2px;
    }
    .stat-kpi .label {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      margin-top: 6px; letter-spacing: 0.4px;
    }
    .stat-kpi.streak .num { color: var(--accent); }
    .stat-kpi.today .num { color: var(--yellow); }
    .stat-kpi.total .num { color: var(--green); }

    .stats-section {
      background: var(--card); border-radius: var(--r-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow-md);
      padding: 14px 16px 16px; margin-bottom: 12px;
    }
    .stats-section h3 {
      font-size: 14px; font-weight: 700; letter-spacing: -0.1px;
      margin-bottom: 10px; display: flex; align-items: center;
      justify-content: space-between;
    }
    .stats-section h3 .sub {
      font-size: 11px; font-weight: 500; color: var(--text-tertiary);
    }

    /* heatmap: 7 cols x N rows */
    .heatmap {
      display: grid; grid-template-columns: auto repeat(var(--weeks, 13), 1fr);
      gap: 3px; align-items: center;
    }
    .heatmap .hm-wd {
      font-size: 10px; color: var(--text-tertiary);
      text-align: right; padding-right: 6px; height: 14px; line-height: 14px;
    }
    .hm-cell {
      aspect-ratio: 1; border-radius: 3px;
      background: var(--cell-pending);
      transition: transform var(--t-fast) var(--ease-out);
    }
    .hm-cell:hover { transform: scale(1.25); z-index: 2; position: relative; }
    .hm-cell.l1 { background: color-mix(in srgb, var(--green) 28%, var(--cell-pending)); }
    .hm-cell.l2 { background: color-mix(in srgb, var(--green) 55%, var(--cell-pending)); }
    .hm-cell.l3 { background: color-mix(in srgb, var(--green) 80%, var(--cell-pending)); }
    .hm-cell.l4 { background: var(--green); }
    .hm-cell.future { background: transparent; border: 1px dashed var(--border); }
    .hm-cell.today-mark { box-shadow: 0 0 0 1.5px var(--accent); }
    .heatmap-foot {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; font-size: 10px; color: var(--text-tertiary);
    }
    .heatmap-scale { display: flex; gap: 3px; align-items: center; }
    .heatmap-scale .sq {
      width: 10px; height: 10px; border-radius: 2px; background: var(--cell-pending);
    }

    /* per-task rank list */
    .task-rank { display: flex; flex-direction: column; gap: 10px; }
    .task-rank-row {
      display: grid; grid-template-columns: 10px 1fr auto; gap: 10px;
      align-items: center;
    }
    .task-rank-row .swatch {
      width: 10px; height: 10px; border-radius: 3px;
    }
    .task-rank-row .name {
      font-size: 13px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .task-rank-row .bar-wrap {
      grid-column: 2 / -1; height: 6px;
      background: var(--cell-pending); border-radius: 3px; overflow: hidden;
    }
    .task-rank-row .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s var(--ease-out); }
    .task-rank-row .count {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    /* milestones strip */
    .milestone-strip {
      display: flex; gap: 8px; overflow-x: auto;
      margin: 0 -16px; padding: 2px 16px 4px;
      scrollbar-width: none;
    }
    .milestone-strip::-webkit-scrollbar { display: none; }
    .milestone {
      flex: 0 0 auto;
      padding: 8px 12px; border-radius: var(--r-pill);
      font-size: 12px; font-weight: 600;
      background: var(--bg-elev); color: var(--text-secondary);
      border: 1px solid var(--border);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .milestone.hit {
      background: var(--green-soft); color: #1a6b3a;
      border-color: color-mix(in srgb, var(--green) 35%, transparent);
    }
    .milestone .ms-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary);
    }
    .milestone.hit .ms-dot { background: var(--green); }

    .stats-empty {
      text-align: center; padding: 40px 16px; color: var(--text-tertiary);
      font-size: 13px;
    }

    /* ── Task color tag in grid ─────────────────────────── */
    .task-color-bar {
      width: 4px; align-self: stretch; border-radius: 2px;
      margin-right: 12px; flex-shrink: 0;
      background: var(--accent);
    }
    .task-color-row {
      display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    }
    .task-color-row .swatch {
      width: 22px; height: 22px; border-radius: 50%;
      cursor: pointer; transition: transform var(--t-fast) var(--ease-spring);
      border: 2px solid transparent;
    }
    .task-color-row .swatch:active { transform: scale(0.88); }
    .task-color-row .swatch.sel {
      border-color: var(--text-primary);
    }

    /* ── Confetti ─────────────────────────────────── */
    .confetti-root {
      position: fixed; inset: 0; pointer-events: none; z-index: 460;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute; width: 8px; height: 12px;
      border-radius: 2px;
      animation: confetti-fall 1.6s cubic-bezier(0.2, 0.6, 0.4, 1) forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Carry-forward suggestion ─────────────────────── */
    .carry-card {
      background: var(--yellow-soft);
      border: 1px solid color-mix(in srgb, var(--yellow) 30%, transparent);
      border-radius: var(--r-md);
      padding: 10px 12px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
      animation: slideIn 0.25s var(--ease-out);
    }
    .carry-card .carry-icon {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--yellow); color: #4d3a08;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: 800; font-size: 12px;
    }
    .carry-card .carry-text {
      flex: 1; font-size: 13px; font-weight: 500; color: #7a5408;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .carry-card .carry-btn {
      background: var(--yellow); color: #4d3a08;
      border: none; padding: 5px 10px; border-radius: var(--r-pill);
      font-size: 11px; font-weight: 700; cursor: pointer;
      transition: transform var(--t-fast) var(--ease-out);
      flex-shrink: 0;
    }
    .carry-card .carry-btn:active { transform: scale(0.94); }
    .carry-card .carry-dismiss {
      border: none; background: transparent; cursor: pointer;
      color: #7a5408; font-size: 14px; line-height: 1;
      padding: 2px 4px;
    }

    /* ── Container ─────────────────────────────────── */
    .container { max-width: 560px; margin: 0 auto; padding: 0 16px; }
    .tab-page { display: none; animation: fadeInUp 0.25s var(--ease-out); }
    .tab-page.active { display: block; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Calendar ─────────────────────────────────── */
    .calendar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 2px 10px;
    }
    .calendar-header h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
    .cal-nav {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-elev); border: none;
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
    }
    .cal-nav:active { transform: scale(0.9); background: var(--border-strong); }
    .cal-nav svg { width: 14px; height: 14px; }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      text-align: center; font-size: 11px; color: var(--text-tertiary);
      padding: 6px 0; font-weight: 600; letter-spacing: 0.4px;
    }
    .cal-days {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 10px;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: background var(--t-fast) var(--ease-out), transform var(--t-fast) var(--ease-out);
      color: var(--text-primary);
    }
    .cal-day:active { transform: scale(0.92); background: var(--bg-elev); }
    .cal-day.other-month { color: var(--text-tertiary); }
    .cal-day.today {
      background: var(--accent-soft);
      color: var(--accent-ink);
      font-weight: 700;
    }
    .cal-day.selected {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .cal-day.today.selected { background: var(--accent); color: #fff; }
    .cal-day .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--green);
      position: absolute; bottom: 5px;
    }
    .cal-day.today .dot { background: var(--accent); }
    .cal-day.selected .dot { background: #fff; }

    /* ── Day Detail ─────────────────────────────────── */
    .day-detail {
      background: var(--card);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      margin-top: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .day-detail-header {
      padding: 14px 16px;
      font-size: 14px; font-weight: 600;
      display: flex; align-items: center; justify-content: space-between;
      color: var(--text-secondary);
      letter-spacing: 0.1px;
    }
    .day-detail-header .date-label {
      color: var(--text-primary); font-weight: 600; font-size: 15px;
    }
    .day-detail-header .date-count {
      font-size: 12px; font-weight: 500;
      padding: 2px 8px; border-radius: var(--r-pill);
      background: var(--bg-elev);
    }

    .calendar-task-list {
      border-top: 1px solid var(--border);
    }
    .calendar-task-list:empty { display: none; }
    .calendar-task-item {
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.25s var(--ease-out);
    }
    .calendar-task-item:last-child { border-bottom: none; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .calendar-task-checkbox {
      display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer;
      min-width: 0;
    }
    .cb {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.8px solid var(--border-strong);
      flex-shrink: 0;
      position: relative;
      transition: all var(--t-med) var(--ease-out);
      display: flex; align-items: center; justify-content: center;
    }
    .cb svg { width: 12px; height: 12px; opacity: 0; transform: scale(0.6); transition: all var(--t-med) var(--ease-spring); color: #fff; }
    .calendar-task-checkbox input { display: none; }
    .calendar-task-checkbox input:checked + .cb {
      background: var(--green); border-color: var(--green);
    }
    .calendar-task-checkbox input:checked + .cb svg { opacity: 1; transform: scale(1); }
    .calendar-task-name {
      font-size: 15px; font-weight: 500;
      transition: all var(--t-med) var(--ease-out);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .calendar-task-name.done {
      color: var(--text-tertiary); text-decoration: line-through;
    }
    .calendar-task-delete {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: transparent; color: var(--text-tertiary);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t-fast) var(--ease-out);
      flex-shrink: 0;
    }
    .calendar-task-delete:hover { background: var(--red-soft); color: var(--red); }
    .calendar-task-delete:active { transform: scale(0.88); }
    .calendar-task-delete svg { width: 12px; height: 12px; }
    .add-inline-btn {
      display: flex; width: 100%; padding: 12px 16px;
      background: transparent; border: none;
      border-top: 1px solid var(--border);
      color: var(--accent);
      font-size: 14px; font-weight: 600; cursor: pointer;
      align-items: center; justify-content: center; gap: 6px;
      transition: background var(--t-fast) var(--ease-out);
    }
    .add-inline-btn:active { background: var(--bg-elev); }
    .add-inline-btn svg { width: 14px; height: 14px; }

    .day-empty {
      padding: 28px 16px; text-align: center;
      color: var(--text-tertiary); font-size: 13px;
    }

    /* ── Task Cards ─────────────────────────────────── */
    .task-card {
      background: var(--card);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      transition: box-shadow var(--t-med) var(--ease-out);
    }
    .task-card.open { box-shadow: var(--shadow-lg); }
    .task-header {
      padding: 14px 16px;
      display: flex; align-items: stretch;
      justify-content: space-between;
      cursor: pointer;
      transition: background var(--t-fast) var(--ease-out);
    }
    .task-header:active { background: var(--bg-elev); }
    .task-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .task-name {
      font-size: 16px; font-weight: 600; letter-spacing: -0.1px;
      margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .task-meta {
      font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .task-meta .count { font-weight: 600; color: var(--text-primary); }
    .task-meta .sep { color: var(--text-tertiary); }
    .task-meta .tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 7px; border-radius: var(--r-pill);
      font-size: 11px; font-weight: 600;
    }
    .task-meta .tag.today { background: var(--yellow-soft); color: #b07a14; }
    .task-meta .tag.bonus { background: var(--purple-soft); color: var(--purple); }
    .progress-bar-wrap {
      width: 72px; height: 4px; background: var(--cell-pending);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--green); border-radius: 2px;
      transition: width 0.4s var(--ease-out);
    }
    .task-arrow {
      width: 18px; height: 18px; margin-left: 10px;
      transition: transform var(--t-slow) var(--ease-spring);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .task-card.open .task-arrow { transform: rotate(180deg); color: var(--text-secondary); }
    .task-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s var(--ease-out);
    }
    .task-card.open .task-body { max-height: 4000px; }
    .task-body-inner { padding: 0 16px 16px; }

    /* ── Legend (compact hint strip) ─────────────────────── */
    .legend-strip {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 8px 10px; margin-bottom: 10px;
      background: var(--bg-elev); border-radius: var(--r-md);
      font-size: 11px; color: var(--text-secondary);
      align-items: center;
    }
    .legend-item {
      display: inline-flex; align-items: center; gap: 5px;
    }
    .legend-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-hint {
      flex-basis: 100%; font-size: 11px; color: var(--text-tertiary);
      padding-top: 4px; border-top: 1px dashed var(--border-strong); margin-top: 2px;
    }

    /* ── Grid ─────────────────────────────────── */
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .cell {
      aspect-ratio: 1; border-radius: 10px;
      cursor: pointer; position: relative;
      transition: transform var(--t-fast) var(--ease-spring), background var(--t-med) var(--ease-out), box-shadow var(--t-med) var(--ease-out);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
      overflow: hidden;
    }
    .cell:active { transform: scale(0.88); }
    .cell.pending {
      background: var(--cell-pending);
      color: var(--text-tertiary);
    }
    .cell.done {
      background: var(--green);
      color: #fff;
    }
    .cell.today {
      background: var(--yellow);
      color: #4d3a08;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--yellow) 30%, transparent);
      animation: pop 0.32s var(--ease-spring);
    }
    .cell.bonus {
      background: var(--purple);
      color: #fff;
    }
    @keyframes pop {
      0% { transform: scale(0.6); }
      60% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* ── Subtask ─────────────────────────────────── */
    .subtasks-section { margin-top: 10px; }
    .subtask-item {
      background: var(--bg-elev);
      border-radius: var(--r-md);
      padding: 10px 12px;
      margin-bottom: 8px;
      transition: box-shadow var(--t-med) var(--ease-out);
    }
    .subtask-item.open {
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--border);
    }
    .subtask-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      gap: 8px;
    }
    .subtask-name {
      font-size: 14px; font-weight: 600; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .subtask-meta {
      font-size: 11px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .subtask-progress-wrap {
      width: 40px; height: 3px; background: var(--cell-pending);
      border-radius: 2px; overflow: hidden;
    }
    .subtask-progress-fill {
      height: 100%; background: var(--green); border-radius: 2px;
      transition: width 0.4s var(--ease-out);
    }
    .subtask-arrow {
      width: 14px; height: 14px;
      transition: transform var(--t-slow) var(--ease-spring);
      color: var(--text-tertiary); flex-shrink: 0;
    }
    .subtask-item.open .subtask-arrow { transform: rotate(180deg); }
    .subtask-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s var(--ease-out);
    }
    .subtask-item.open .subtask-body { max-height: 800px; }
    .subtask-body-inner { padding: 12px 0 4px; }
    .subtask-body .grid { gap: 6px; }
    .subtask-body .cell { border-radius: 8px; font-size: 9px; }

    /* ── Quick add chips (today +1/+5/+10) ─────────────── */
    .quick-chips {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    }
    .chip {
      flex: 1; min-width: 0;
      padding: 8px 10px;
      background: var(--yellow-soft);
      color: #8a600a;
      border: none;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: transform var(--t-fast) var(--ease-spring), background var(--t-fast) var(--ease-out);
    }
    .chip:active { transform: scale(0.95); }
    .chip:hover { background: color-mix(in srgb, var(--yellow-soft) 80%, var(--yellow)); }

    .subtask-actions {
      display: flex; gap: 6px; margin-top: 10px;
    }
    .mini-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      font-size: 12px; font-weight: 500;
      padding: 7px 10px; border-radius: 8px;
      cursor: pointer;
      transition: all var(--t-fast) var(--ease-out);
    }
    .mini-btn:active { transform: scale(0.96); }
    .mini-btn.danger { color: var(--red); }
    .mini-btn.danger:hover { background: var(--red-soft); border-color: var(--red); }

    .task-card-footer {
      display: flex; gap: 8px;
      padding-top: 12px;
      margin-top: 12px;
      border-top: 1px solid var(--border);
    }
    .add-subtask-btn {
      flex: 1;
      padding: 10px;
      background: var(--accent-soft);
      border: none;
      border-radius: 10px;
      color: var(--accent-ink);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
    }
    .add-subtask-btn:active { transform: scale(0.98); }
    .delete-task-btn {
      padding: 10px 14px;
      background: transparent;
      border: none;
      color: var(--red);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: background var(--t-fast) var(--ease-out);
    }
    .delete-task-btn:hover { background: var(--red-soft); }

    /* ── FAB ─────────────────────────────────── */
    .fab-group {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%); z-index: 200;
    }
    .fab {
      border: none; border-radius: var(--r-pill);
      padding: 14px 24px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff;
      box-shadow: var(--shadow-fab);
      transition: transform var(--t-fast) var(--ease-spring), box-shadow var(--t-med) var(--ease-out);
      display: flex; align-items: center; gap: 7px;
    }
    .fab:active {
      transform: translateX(-50%) scale(0.94);
      box-shadow: 0 3px 10px rgba(74, 125, 255, 0.35);
    }
    .fab-group.fab-group-wrapper { transform: translateX(-50%); }
    .fab-group.fab-group-wrapper .fab { transform: none; }
    .fab-group.fab-group-wrapper .fab:active { transform: scale(0.94); }

    /* ── Modal ─────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 10, 20, 0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity var(--t-med) var(--ease-out);
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border-radius: var(--r-xl);
      width: 100%; max-width: 360px; padding: 22px 20px 18px;
      transform: scale(0.92) translateY(14px);
      transition: transform var(--t-slow) var(--ease-spring);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
    }
    .modal-overlay.show .modal { transform: scale(1) translateY(0); }
    .modal h2 {
      font-size: 17px; font-weight: 700; text-align: center;
      margin-bottom: 16px; letter-spacing: -0.2px;
    }
    .modal input {
      width: 100%;
      border: 1.5px solid var(--border-strong);
      border-radius: 12px;
      padding: 12px 14px; font-size: 15px; outline: none;
      transition: border-color var(--t-med) var(--ease-out), background var(--t-med) var(--ease-out);
      background: var(--bg-elev);
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .modal input:focus {
      border-color: var(--accent);
      background: var(--card);
    }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns button {
      flex: 1; padding: 12px;
      border-radius: 12px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
    }
    .modal-btns button:active { transform: scale(0.97); }
    .btn-cancel { background: var(--bg-elev); color: var(--text-primary); }
    .btn-cancel:hover { background: var(--border-strong); }
    .btn-confirm { background: var(--accent); color: #fff; }
    .btn-confirm:hover { background: var(--accent-ink); }

    /* ── Countdown page ─────────────────────────────────── */
    .countdown-list { display: flex; flex-direction: column; gap: 10px; }
    .countdown-card {
      background: var(--card); border-radius: var(--r-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      padding: 16px; display: flex; align-items: center; gap: 14px;
      position: relative;
      transition: transform var(--t-fast) var(--ease-out);
    }
    .countdown-card:active { transform: scale(0.985); }
    .countdown-days {
      font-size: 40px; font-weight: 900; letter-spacing: -1px;
      color: var(--accent); line-height: 1; min-width: 60px; text-align: center;
    }
    .countdown-days .unit { font-size: 14px; font-weight: 700; color: var(--text-secondary); }
    .countdown-info { flex: 1; min-width: 0; }
    .countdown-name {
      font-size: 16px; font-weight: 700; color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .countdown-date { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
    .countdown-status { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 2px; }
    .countdown-status.passed { color: var(--red); }
    .countdown-delete {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: transparent; color: var(--text-tertiary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--t-fast) var(--ease-out), color var(--t-fast) var(--ease-out);
    }
    .countdown-delete:hover { background: var(--red-soft); color: var(--red); }
    .countdown-delete svg { width: 14px; height: 14px; }
    .countdown-empty {
      text-align: center; padding: 60px 16px; color: var(--text-tertiary);
      font-size: 14px;
    }
    .countdown-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .countdown-add-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--r-pill); padding: 6px 16px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      transition: background var(--t-fast) var(--ease-out);
    }
    .countdown-add-btn:hover { background: var(--accent-ink); }
    .countdown-add-btn svg { width: 14px; height: 14px; }

    /* ── Countdown modal ─────────────────────────────────── */
    .countdown-modal-row { margin-bottom: 14px; }
    .countdown-modal-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-bottom: 5px; }
    .countdown-modal-input {
      width: 100%; box-sizing: border-box; padding: 10px 12px;
      border-radius: var(--r-sm); border: 1px solid var(--border);
      background: var(--bg); color: var(--text-primary); font-size: 15px;
      transition: border-color var(--t-fast) var(--ease-out);
    }
    .countdown-modal-input:focus { outline: none; border-color: var(--accent); }
    .countdown-modal-input[type="date"] { font-family: inherit; }

    /* ── Empty state ─────────────────────────────────── */
    .empty-hint {
      text-align: center;
      padding: 80px 20px 40px;
      color: var(--text-tertiary);
    }
    .empty-hint .empty-art {
      width: 72px; height: 72px; margin: 0 auto 16px;
      background: var(--bg-elev);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
    }
    .empty-hint .empty-art svg { width: 32px; height: 32px; }
    .empty-hint .empty-title {
      font-size: 16px; font-weight: 600; color: var(--text-primary);
      margin-bottom: 4px;
    }
    .empty-hint .empty-sub { font-size: 13px; color: var(--text-secondary); }

    /* ── Loading Overlay ─────────────────────── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(10px);
      z-index: 400;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px;
      opacity: 0; pointer-events: none;
      transition: opacity var(--t-med) var(--ease-out);
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .loading-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-secondary); }

    /* ── Toast ─────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(96px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: color-mix(in srgb, var(--text-primary) 92%, transparent);
      color: var(--bg);
      font-size: 13px; font-weight: 500;
      padding: 10px 16px;
      border-radius: var(--r-pill);

      transition: all var(--t-slow) var(--ease-spring);

    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Reduced motion ─────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.62, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f2f2f7" />
  <title>学习追踪器</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text-primary: #1c1c1e;
      --text-secondary: #8e8e93;
      --accent: #007aff;
      --gray: #d1d1d6;
      --green: #34c759;
      --yellow: #ffcc00;
      --purple: #af52de;
      --red: #ff3b30;
      --orange: #ff9500;
      --border: #e5e5ea;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 80px;
      overflow-x: hidden;
    }

    /* ── Auth Screen ── */
    .auth-screen {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 24px;
      background: var(--bg);
      overflow: hidden;
    }
    .auth-card {
      background: var(--card); border-radius: 24px; padding: 40px 28px 28px;
      width: 100%; max-width: 340px; box-shadow: var(--shadow);
      text-align: center;
    }
    .auth-card h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .auth-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
    .auth-card input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 14px;
      padding: 14px 16px; font-size: 16px; outline: none;
      transition: border-color 0.2s; background: var(--bg); margin-bottom: 14px;
    }
    .auth-card input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%; border: none; border-radius: 14px; padding: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      background: var(--accent); color: #fff; transition: opacity 0.15s;
    }
    .auth-btn:active { opacity: 0.7; }
    .auth-hint { font-size: 12px; color: var(--text-secondary); margin-top: 12px; }
    .auth-error { color: var(--red); font-size: 13px; margin-bottom: 12px; min-height: 20px; }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(242,242,247,0.85);
      backdrop-filter: blur(20px);
      -webkit-backbackdrop-filter: blur(20px);
      padding: 16px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 22px; font-weight: 700; }
    .header-date { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .user-badge {
      font-size: 11px; background: var(--accent); color: #fff;
      padding: 3px 8px; border-radius: 10px; margin-left: 8px;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex; background: var(--card); border-radius: 12px;
      margin: 12px 16px; box-shadow: var(--shadow); overflow: hidden;
    }
    .tab-btn {
      flex: 1; padding: 10px 0; border: none; background: transparent;
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--accent); color: #fff; }

    /* ── Container ── */
    .container { max-width: 520px; margin: 0 auto; padding: 0 16px 80px; }
    .tab-page { display: none; }
    .tab-page.active { display: block; }

    /* ── Calendar ── */
    .calendar-header {
      display: flex; align-items: center; justify-content: space-between; padding: 12px 0;
    }
    .calendar-header h2 { font-size: 18px; font-weight: 700; }
    .cal-nav {
      background: none; border: none; font-size: 20px;
      color: var(--accent); cursor: pointer; padding: 4px 12px;
    }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      text-align: center; font-size: 12px; color: var(--text-secondary);
      padding: 8px 0; font-weight: 600;
    }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; border-radius: 12px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      position: relative; transition: background 0.15s;
    }
    .cal-day:active { background: var(--gray); }
    .cal-day.other-month { color: var(--gray); }
    .cal-day.today { background: var(--accent); color: #fff; font-weight: 700; }
    .cal-day.selected { background: var(--yellow); color: var(--text-primary); }
    .cal-day .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); position: absolute; bottom: 4px;
    }
    .cal-day.today .dot { background: #fff; }

    /* ── Day Detail ── */
    .day-detail {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-top: 16px; overflow: hidden;
    }
    .day-detail-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 15px; font-weight: 600;
      display: flex; align-items: center; justify-content: space-between;
    }
    .add-session-btn {
      display: block; width: 100%; padding: 12px; background: var(--bg);
      border: none; border-top: 1px solid var(--border); color: var(--accent);
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .calendar-task-item {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .calendar-task-checkbox {
      display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer;
    }
    .calendar-task-checkbox input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer;
    }
    .calendar-task-name {
      font-size: 15px; font-weight: 600; transition: all 0.2s;
    }
    .calendar-task-name.done {
      color: var(--text-secondary); text-decoration: line-through;
    }
    .calendar-task-delete {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: var(--red); color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0.7; transition: opacity 0.15s; line-height: 1; flex-shrink: 0;
    }
    .calendar-task-delete:active { opacity: 1; }

    /* ── Backup Bar ── */
    .backup-bar {
      display: flex; gap: 8px; padding: 10px 16px;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .backup-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--card); color: var(--text-secondary);
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .backup-btn:active { opacity: 0.7; transform: scale(0.96); }
    .backup-btn.export { color: var(--accent); border-color: var(--accent); }
    .backup-btn.import { color: var(--green); border-color: var(--green); }
    .backup-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── Task Cards ── */
    .task-card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px;
    }
    .task-header {
      padding: 16px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer;
    }
    .task-header:active { opacity: 0.7; }
    .task-info { flex: 1; }
    .task-name { font-size: 17px; font-weight: 600; }
    .task-meta {
      font-size: 12px; color: var(--text-secondary); margin-top: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .progress-bar-wrap {
      width: 60px; height: 4px; background: var(--gray);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--green); border-radius: 2px;
      transition: width 0.3s ease;
    }
    .task-arrow {
      width: 20px; height: 20px; margin-left: 8px;
      transition: transform 0.25s ease; opacity: 0.4;
    }
    .task-card.open .task-arrow { transform: rotate(180deg); }
    .task-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .task-card.open .task-body { max-height: 3000px; }
    .task-body-inner { padding: 4px 16px 16px; }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .cell {
      aspect-ratio: 1; border-radius: 12px; cursor: pointer; position: relative;
      transition: transform 0.15s ease, background 0.2s ease;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 2px; overflow: hidden;
      text-align: center; line-height: 1.1;
    }
    .cell:active { transform: scale(0.92); }
    .cell .cell-label {
      font-size: 9px; max-width: 100%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; display: block;
    }
    .cell.pending { background: var(--gray); }
    .cell.pending .cell-label { color: var(--text-secondary); }
    .cell.done { background: var(--green); }
    .cell.done .cell-label { color: #fff; }
    .cell.today { background: var(--yellow); box-shadow: 0 0 0 3px rgba(255,204,0,0.35); }
    .cell.today .cell-label { color: var(--text-primary); }
    .cell.bonus { background: var(--purple); }
    .cell.bonus .cell-label { color: #fff; }

    /* ── Subtask ── */
    .subtasks-section { margin-top: 16px; }
    .subtask-item {
      background: var(--bg); border-radius: 12px;
      padding: 12px; margin-bottom: 12px;
    }
    .subtask-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; margin-bottom: 4px;
    }
    .subtask-header:active { opacity: 0.7; }
    .subtask-name { font-size: 15px; font-weight: 600; flex: 1; }
    .subtask-meta {
      font-size: 11px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 6px;
    }
    .subtask-progress-wrap {
      width: 40px; height: 3px; background: var(--gray); border-radius: 2px; overflow: hidden;
    }
    .subtask-progress-fill {
      height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s ease;
    }
    .subtask-arrow {
      width: 16px; height: 16px; margin-left: 6px;
      transition: transform 0.25s ease; opacity: 0.4;
    }
    .subtask-item.open .subtask-arrow { transform: rotate(180deg); }
    .subtask-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .subtask-item.open .subtask-body { max-height: 600px; }
    .subtask-body-inner { padding: 8px 0 0; }
    .subtask-body .grid { gap: 6px; }
    .subtask-body .cell { border-radius: 8px; }
    .delete-subtask-btn, .delete-task-btn {
      background: none; border: none; color: var(--red);
      font-size: 13px; cursor: pointer; padding: 8px 0; width: 100%; text-align: center;
    }
    .add-subtask-btn {
      display: block; width: 100%; padding: 10px;
      background: var(--bg); border: 1.5px dashed var(--border);
      border-radius: 12px; color: var(--accent);
      font-size: 14px; font-weight: 500; cursor: pointer; text-align: center;
    }
    .add-subtask-btn:active { background: var(--border); }

    /* ── Legend ── */
    .legend {
      display: flex; gap: 14px; flex-wrap: wrap; padding: 10px 0;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-secondary);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── FAB ── */
    .fab-group {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%); z-index: 200;
    }
    .fab {
      border: none; border-radius: 24px; padding: 14px 28px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 20px rgba(0,122,255,0.4);
      transition: transform 0.15s ease;
      display: flex; align-items: center; gap: 6px;
    }
    .fab:active { transform: translateX(-50%) scale(0.96); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 300; display: flex; align-items: center;
      justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border-radius: 20px;
      width: 100%; max-width: 340px; padding: 24px 20px 20px;
      transform: scale(0.92) translateY(10px);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal { transform: scale(1) translateY(0); }
    .modal h2 { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 16px; }
    .modal input, .modal select {
      width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
      padding: 12px 14px; font-size: 16px; outline: none;
      transition: border-color 0.2s; background: var(--bg); margin-bottom: 10px;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
    .modal-btns button {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .modal-btns button:active { opacity: 0.8; }
    .btn-cancel { background: var(--bg); color: var(--text-primary); }
    .btn-confirm { background: var(--accent); color: #fff; }
    .empty-hint { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 15px; }
    .empty-hint span { display: block; font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

    /* ── Loading Overlay ── */
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(242,242,247,0.9);
      backdrop-filter: blur(10px); z-index: 400;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
    }
    .loading-spinner {
      width: 28px; height: 28px; border: 3px solid var(--gray);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-secondary); }

    /* ── Sync Status ── */
    .sync-status {
      position: fixed; top: 70px; right: 16px; z-index: 150;
      font-size: 10px; padding: 3px 8px; border-radius: 8px;
      background: var(--card); color: var(--text-secondary);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .sync-status.syncing { color: var(--accent); }
    .sync-status.error { color: var(--red); }
    .sync-status.offline { color: var(--orange); }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <h1>学习追踪</h1>
    <p>输入账号密码登录</p>
    <div class="auth-error" id="authError"></div>
    <input type="text" id="authUser" placeholder="账号" autocomplete="username" />
    <input type="password" id="authPass" placeholder="密码" autocomplete="current-password" />
    <button class="auth-btn" id="authLoginBtn">登录</button>
    <div class="auth-hint" id="authHint">数据将安全保存在云端 ☁️</div>
  </div>
</div>

<!-- Main App (hidden until logged in) -->
<div id="mainApp" style="display:none;">
  <header>
    <h1>学习追踪</h1>
    <span class="header-date" id="headerDate"></span>
  </div>
  <div class="sync-status" id="syncStatus">● 在线</div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="calendar">📅 日历</button>
    <button class="tab-btn" data-tab="grid">🔲 网格</button>
  </div>

  <div class="container">
    <div class="tab-page active" id="calendarPage">
      <div class="calendar-header">
        <button class="cal-nav" id="calPrev">◀</button>
        <h2 id="calTitle"></h2>
        <button class="cal-nav" id="calNext">▶</button>
      </div>
      <div class="cal-weekdays">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>
      <div class="cal-days" id="calDays"></div>
      <div id="dayDetail"></div>
    </div>
    <div class="tab-page" id="gridPage">
      <div id="taskList"></div>
      <div class="empty-hint" id="emptyHint" style="display:none;">
        <span>📚</span>还没有任务<br/>点击下方按钮添加一个
      </div>
    </div>
  </div>

  <div class="fab-group">
    <button class="fab" id="addBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 3v12M3 9h12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      添加任务
    </button>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">新建任务</h2>
      <div id="modalContent"></div>
      <div class="modal-btns">
        <button class="btn-cancel" id="modalCancel">取消</button>
        <button class="btn-confirm" id="modalConfirm">确认</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">同步中…</div>
  </div>
</div>

<script>
// ── Supabase Setup ──
const SUPABASE_URL = 'https://wpwlbulloksrspbpclmt.supabase.co';
const SUPABASE_ANON = 'sb_publishable_fXJKvM-vxOvXb-yFntMXdw_JU0DCjKJ';
let supabase;

// Check if Supabase SDK loaded
if (!window.supabase) {
  console.error('Supabase SDK not loaded!');
  document.getElementById('authError').textContent = 'SDK 加载失败，请刷新重试';
} else {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  console.log('Supabase client initialized');
}

// User accounts — hardcoded credentials
const USER_ACCOUNTS = {
  'raylan': { email: 'raylan@learningtracker.app', password: 'Raylan1234', name: 'Raylan' },
  'carol': { email: 'carol@learningtracker.app', password: 'Carol1234', name: 'Carol' },
};

const STORAGE_KEY = 'learning_tracker_v5';
const TARGET = 30;
const GRID_SIZE = 60;

let user = null;  // Supabase user
let tasks = [];
let sessions = {};
let calendarTasks = {};
let todayKey = '';
let selectedDate = '';
let calYear = 0, calMonth = 0;
let currentModalMode = '';
let currentModalTaskId = '';
let cardOpenState = {};
let localSaveTimeout = null;
let syncDebounceTimer = null;
let localChanges = false;

// ── Auth ──
async function checkSession() {
  const { data } = await supabase.auth.getSession();
  if (data?.session) {
    user = data.session.user;
    showApp();
    await loadFromCloud();
    initApp();
  } else {
    showAuth();
  }
}

function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

document.getElementById('authLoginBtn').addEventListener('click', async () => {
  const username = document.getElementById('authUser').value.trim().toLowerCase();
  const password = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');
  const btn = document.getElementById('authLoginBtn');
  
  if (!supabase) {
    errEl.textContent = 'Supabase 未初始化，请刷新页面';
    return;
  }
  if (!username || !password) {
    errEl.textContent = '请输入账号和密码';
    return;
  }
  
  const account = USER_ACCOUNTS[username];
  if (!account) {
    errEl.textContent = '账号不存在';
    return;
  }
  
  errEl.textContent = '';
  btn.textContent = '登录中…';
  btn.disabled = true;

  try {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: account.email,
      password: password
    });
    if (error) {
      errEl.textContent = '密码错误';
      btn.textContent = '登录';
      btn.disabled = false;
    } else {
      user = data.user;
      showApp();
      loadFromCloud().then(() => initApp());
    }
  } catch (e) {
    console.error('Login failed:', e);
    errEl.textContent = '登录失败，请重试';
    btn.textContent = '登录';
    btn.disabled = false;
  }
});

// Allow Enter key to submit
document.getElementById('authPass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('authLoginBtn').click();
});

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session?.user) {
    user = session.user;
    showApp();
    loadFromCloud().then(() => {
      initApp();
    });
  } else if (event === 'SIGNED_OUT') {
    user = null;
    showAuth();
  }
});

// ── Cloud Sync ──
async function loadFromCloud() {
  if (!user) return;
  showLoading('从云端加载数据…');
  try {
    const { data, error } = await supabase
      .from('learning_tracker_data')
      .select('tasks, sessions, calendar_tasks')
      .eq('user_id', user.id)
      .single();

    if (error && error.code !== 'PGRST116') throw error;

    if (data && data.tasks) {
      tasks = data.tasks;
      sessions = data.sessions || {};
      calendarTasks = data.calendar_tasks || {};
    } else {
      // No cloud data, try local cache (v4)
      try {
        const localRaw = localStorage.getItem('learning_tracker_v4');
        if (localRaw) {
          const local = JSON.parse(localRaw);
          tasks = local.tasks || [];
          sessions = local.sessions || {};
          localSaveTimeout = setTimeout(saveToCloud, 3000);
        }
      } catch { /* ignore */ }
    }

    hideLoading();
  } catch (e) {
    console.error('Cloud load failed:', e);
    hideLoading();
    // Fallback to localStorage
    try {
      const localRaw = localStorage.getItem(STORAGE_KEY);
      if (localRaw) {
        const local = JSON.parse(localRaw);
        tasks = local.tasks || [];
        sessions = local.sessions || {};
        calendarTasks = local.calendar_tasks || {};
      }
    } catch { /* ignore */ }
  }
}

async function saveToCloud() {
  if (!user) return;
  setSyncStatus('syncing', '⏳ 同步中…');
  localChanges = false;

  try {
    await supabase.from('learning_tracker_data').upsert({
      user_id: user.id,
      tasks,
      sessions,
      calendar_tasks: calendarTasks
    }, { onConflict: 'user_id' });

    setSyncStatus('online', '● 已同步');
  } catch (e) {
    console.error('Cloud save failed:', e);
    setSyncStatus('error', '⚠ 同步失败');
  }
}

function debouncedCloudSave() {
  if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
  localChanges = true;
  syncDebounceTimer = setTimeout(() => saveToCloud(), 2000);  // 2s debounce
}

// ── Local Storage (cache) ──
function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, sessions, calendar_tasks: calendarTasks }));
  debouncedCloudSave();
}

// ── Init ──
function initApp() {
  todayKey = getTodayKey();
  selectedDate = todayKey;
  calYear = new Date().getFullYear();
  calMonth = new Date().getMonth();
  renderHeaderDate();
  renderCalendar();
  renderGrid();
  bindEvents();
  setInterval(checkDayChange, 60000);

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateCN(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${d.getMonth()+1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;
}

function formatTime(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderHeaderDate() {
  document.getElementById('headerDate').textContent = formatDateCN(todayKey);
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').style.display = 'flex';
}

function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

function setSyncStatus(type, text) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + type;
  el.textContent = text;
}

// ── Calendar ──
function renderCalendar() {
  const title = document.getElementById('calTitle');
  title.textContent = `${calYear}年${calMonth + 1}月`;
  const container = document.getElementById('calDays');
  container.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    const div = document.createElement('div');
    div.className = 'cal-day other-month';
    div.textContent = prevDays - i;
    container.appendChild(div);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const div = document.createElement('div');
    div.className = 'cal-day';
    div.textContent = d;
    if (dateStr === todayKey) div.classList.add('today');
    if (dateStr === selectedDate) div.classList.add('selected');
    const hasSessions = sessions[dateStr] && sessions[dateStr].length > 0;
    const hasCalTasks = calendarTasks[dateStr] && calendarTasks[dateStr].some(ct => ct.done);
    if (hasSessions || hasCalTasks) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      div.appendChild(dot);
    }
    div.addEventListener('click', () => {
      selectedDate = dateStr;
      renderCalendar();
    });
    container.appendChild(div);
  }
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const div = document.createElement('div');
    div.className = 'cal-day other-month';
    div.textContent = i;
    container.appendChild(div);
  }
  renderCalendarTasks();
}

// ── Grid ──
function renderGrid() {
  const list = document.getElementById('taskList');
  const hint = document.getElementById('emptyHint');
  if (tasks.length === 0) {
    hint.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  hint.style.display = 'none';
  const taskIds = new Set(tasks.map(t => t.id));
  list.querySelectorAll('.task-card').forEach(el => { if (!taskIds.has(el.dataset.id)) el.remove(); });
  tasks.forEach(task => {
    let card = list.querySelector(`.task-card[data-id="${task.id}"]`);
    const isNew = !card;
    if (isNew) { card = document.createElement('div'); card.className = 'task-card'; card.dataset.id = task.id; list.appendChild(card); }
    const wasOpen = card.classList.contains('open');
    const oldSubStates = {};
    card.querySelectorAll('.subtask-item.open').forEach(el => { oldSubStates[el.dataset.subIdx] = true; });
    card.innerHTML = buildCardHTML(task);
    if (wasOpen) card.classList.add('open');
    Object.keys(oldSubStates).forEach(idx => {
      const subEl = card.querySelector(`.subtask-item[data-sub-idx="${idx}"]`);
      if (subEl) subEl.classList.add('open');
    });
  });
  bindCardEvents();
}

function buildCardHTML(task) {
  const subtasks = task.subtasks || [];
  let totalDone = 0, totalToday = 0, totalBonus = 0;
  subtasks.forEach(st => { st.cells.forEach((c, ci) => { if (c.done) { totalDone++; if (ci >= TARGET) totalBonus++; if (c.doneToday) totalToday++; } }); });
  const pct = Math.min((totalDone / Math.max(TARGET, 1)) * 100, 100);
  let subtasksHTML = '';
  subtasks.forEach((st, si) => {
    const stDone = st.cells.filter(c => c.done).length;
    const stPct = Math.min((stDone / TARGET) * 100, 100);
    let stCellsHTML = '';
    st.cells.forEach((c, ci) => {
      let cls = '';
      if (c.done) { if (ci >= TARGET) cls = 'bonus'; else if (c.doneToday) cls = 'today'; else cls = 'done'; } else { cls = 'pending'; }
      stCellsHTML += `<div class="cell ${cls}" data-task="${task.id}" data-sub="${si}" data-cell="${ci}"><span class="cell-label">${ci+1}</span></div>`;
    });
    subtasksHTML += `<div class="subtask-item" data-sub-idx="${si}"><div class="subtask-header" data-sub-toggle="${task.id}-${si}"><span class="subtask-name">${escHtml(st.name)}</span><div class="subtask-meta"><span>${stDone}/${TARGET}</span><div class="subtask-progress-wrap"><div class="subtask-progress-fill" style="width:${stPct}%"></div></div></div><svg class="subtask-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="subtask-body"><div class="subtask-body-inner"><div class="grid">${stCellsHTML}</div><button class="delete-subtask-btn" data-del-sub="${task.id}-${si}">删除此子任务</button></div></div></div>`;
  });
  return `<div class="task-header" data-task-toggle="${task.id}"><div class="task-info"><div class="task-name">${escHtml(task.name)}</div><div class="task-meta"><span>${totalDone} / ${TARGET}</span><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>${totalToday > 0 ? `<span style="color:var(--yellow);">●${totalToday}</span>` : ''}${totalBonus > 0 ? `<span style="color:var(--purple);">+${totalBonus}</span>` : ''}<span style="color:var(--text-secondary);">${subtasks.length} 个子任务</span></div></div><svg class="task-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="task-body"><div class="task-body-inner"><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--gray)"></div>未完成</div><div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>已完成</div><div class="legend-item"><div class="legend-dot" style="background:var(--yellow);box-shadow:0 0 0 2px rgba(255,204,0,0.3)"></div>今日</div><div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>超额（>30）</div><div class="legend-item" style="color:var(--text-secondary);font-size:12px;">点击任意格子点亮下一个空格子，长按可撤销最后点亮的黄色格子</div></div><div class="subtasks-section">${subtasksHTML}</div><button class="add-subtask-btn" data-add-sub="${task.id}">+ 添加子任务</button><button class="delete-task-btn" data-del-task="${task.id}">删除任务</button></div></div>`;
}

function bindCardEvents() {
  document.querySelectorAll('[data-task-toggle]').forEach(el => {
    el.addEventListener('click', () => { const id = el.dataset.taskToggle; const card = el.closest('.task-card'); cardOpenState[id] = !cardOpenState[id]; card.classList.toggle('open', cardOpenState[id]); });
  });
  document.querySelectorAll('[data-sub-toggle]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); el.closest('.subtask-item').classList.toggle('open'); });
  });
  document.querySelectorAll('.cell').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); addProgress(el.dataset.task, parseInt(el.dataset.sub)); });
    let timer;
    el.addEventListener('touchstart', e => { timer = setTimeout(() => { undoLastYellow(el.dataset.task, parseInt(el.dataset.sub)); }, 600); });
    el.addEventListener('touchend', () => clearTimeout(timer));
    el.addEventListener('touchmove', () => clearTimeout(timer));
  });
  document.querySelectorAll('[data-add-sub]').forEach(el => { el.addEventListener('click', e => { e.stopPropagation(); openSubtaskModal(el.dataset.addSub); }); });
  document.querySelectorAll('[data-del-sub]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); const parts = el.dataset.delSub.split('-'); const subIdxStr = parts.pop(); const taskIdd = parts.join('-'); if (confirm('确定删除这个子任务？')) deleteSubtask(taskIdd, parseInt(subIdxStr)); });
  });
  document.querySelectorAll('[data-del-task]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); if (confirm('确定删除这个任务？')) deleteTask(el.dataset.delTask); });
  });
}

function addProgress(taskId, subIdx) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks[subIdx]) return;
  const sub = task.subtasks[subIdx];
  for (let i = 0; i < sub.cells.length; i++) {
    if (!sub.cells[i].done) { sub.cells[i].done = true; sub.cells[i].doneToday = true; break; }
  }
  saveLocal();
  renderGrid();
  renderCalendar();
}

function undoLastYellow(taskId, subIdx) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks[subIdx]) return;
  const sub = task.subtasks[subIdx];
  for (let i = sub.cells.length - 1; i >= 0; i--) {
    if (sub.cells[i].doneToday) { sub.cells[i].done = false; sub.cells[i].doneToday = false; break; }
  }
  saveLocal();
  renderGrid();
  renderCalendar();
}

// ── Calendar Tasks ──
function renderCalendarTasks() {
  const container = document.getElementById('dayDetail');
  const dayCalTasks = calendarTasks[selectedDate] || [];
  let html = `<div class="day-detail"><div class="day-detail-header">${formatDateCN(selectedDate)} · 计划</div>`;
  if (dayCalTasks.length === 0) {
    html += `<div style="padding:16px;text-align:center;color:var(--text-secondary);font-size:14px;">今天还没有计划</div>`;
  } else {
    dayCalTasks.forEach((ct, i) => {
      html += `<div class="calendar-task-item"><label class="calendar-task-checkbox"><input type="checkbox" ${ct.done ? 'checked' : ''} data-ct-check="${selectedDate}|${i}" /><span class="calendar-task-name ${ct.done ? 'done' : ''}">${escHtml(ct.name)}</span></label><button class="calendar-task-delete" data-ct-del="${selectedDate}|${i}">×</button></div>`;
    });
  }
  html += `<button class="add-session-btn" id="addCalTaskBtn">+ 添加计划</button></div>`;
  container.innerHTML = html;
  document.getElementById('addCalTaskBtn').addEventListener('click', () => openCalendarTaskModal());
  container.querySelectorAll('[data-ct-check]').forEach(el => {
    el.addEventListener('change', () => { const [d, i] = el.dataset.ctCheck.split('|'); toggleCalendarTask(d, parseInt(i)); });
  });
  container.querySelectorAll('[data-ct-del]').forEach(el => {
    el.addEventListener('click', () => { const [d, i] = el.dataset.ctDel.split('|'); deleteCalendarTask(d, parseInt(i)); });
  });
}

function openCalendarTaskModal() {
  currentModalMode = 'add-calendar-task';
  document.getElementById('modalTitle').textContent = '添加计划';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="输入今天的计划…" maxlength="50" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) { inp.value = ''; inp.focus(); } }, 200);
}

function addCalendarTask(name) {
  if (!calendarTasks[selectedDate]) calendarTasks[selectedDate] = [];
  calendarTasks[selectedDate].push({ id: Date.now().toString(), name, done: false });
  saveLocal();
  renderCalendar();
  renderCalendarTasks();
}

function toggleCalendarTask(date, idx) {
  if (calendarTasks[date] && calendarTasks[date][idx]) {
    calendarTasks[date][idx].done = !calendarTasks[date][idx].done;
    saveLocal();
    renderCalendar();
    renderCalendarTasks();
  }
}

function deleteCalendarTask(date, idx) {
  if (calendarTasks[date]) {
    calendarTasks[date].splice(idx, 1);
    if (calendarTasks[date].length === 0) delete calendarTasks[date];
    saveLocal();
    renderCalendar();
    renderCalendarTasks();
  }
}

// ── Task CRUD ──
function addTask(name) {
  tasks.push({ id: Date.now().toString(), name, subtasks: [], _lastDate: todayKey });
  saveLocal();
  renderGrid();
  renderCalendar();
  cardOpenState[tasks[tasks.length-1].id] = true;
  renderGrid();
}

function addSubtask(taskId, name) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!task.subtasks) task.subtasks = [];
  task.subtasks.push({ id: `st-${Date.now()}`, name, cells: Array(GRID_SIZE).fill(null).map(() => ({ done: false, doneToday: false, bonus: false })) });
  saveLocal();
  renderGrid();
  cardOpenState[taskId] = true;
  renderGrid();
}

function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); delete cardOpenState[id]; saveLocal(); renderGrid(); }
function deleteSubtask(taskId, subIdx) { const task = tasks.find(t => t.id === taskId); if (!task || !task.subtasks[subIdx]) return; task.subtasks.splice(subIdx, 1); saveLocal(); renderGrid(); }

function checkDayChange() {
  const current = getTodayKey();
  if (tasks.length > 0 && tasks[0]._lastDate !== current) {
    tasks.forEach(t => { if (t.subtasks) { t.subtasks.forEach(st => { st.cells.forEach(c => { c.doneToday = false; }); }); } t._lastDate = current; });
    saveLocal();
    renderGrid();
    renderCalendar();
  }
}

// ── Modal ──
function openTaskModal() {
  currentModalMode = 'add-task';
  document.getElementById('modalTitle').textContent = '新建任务';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="任务名称…" maxlength="30" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) { inp.value = ''; inp.focus(); } }, 200);
}

function openSubtaskModal(taskId) {
  currentModalMode = 'add-subtask';
  currentModalTaskId = taskId;
  document.getElementById('modalTitle').textContent = '添加子任务';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="子任务名称…" maxlength="30" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) { inp.value = ''; inp.focus(); } }, 200);
}

function bindEvents() {
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab + 'Page').classList.add('active');
      updateFabText();
    });
  });

  // Calendar nav
  document.getElementById('calPrev').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
  document.getElementById('calNext').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });

  // FAB
  document.getElementById('addBtn').addEventListener('click', () => {
    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
    if (activeTab === 'calendar') openCalendarTaskModal();
    else openTaskModal();
  });

  function updateFabText() {
    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
    const fab = document.getElementById('addBtn');
    if (activeTab === 'calendar') {
      fab.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>添加计划';
    } else {
      fab.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>添加任务';
    }
  }
  updateFabText();

  // Modal
  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalConfirm').addEventListener('click', handleModalConfirm);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('show')) handleModalConfirm(); });

  // Online/Offline status
  window.addEventListener('online', () => setSyncStatus('online', '● 在线'));
  window.addEventListener('offline', () => setSyncStatus('offline', '○ 离线'));
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function handleModalConfirm() {
  const input = document.getElementById('modalInput');
  if (!input) return;
  const value = input.value.trim();
  if (!value) return;

  switch (currentModalMode) {
    case 'add-task': addTask(value); break;
    case 'add-subtask': addSubtask(currentModalTaskId, value); break;
    case 'add-calendar-task': addCalendarTask(value); break;
  }
  closeModal();
}

// ── Check auth on load ──
checkSession();
</script>

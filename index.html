<script>
// ============================================================
// 学习追踪 — v5 (polished)
// Data layer: identical Supabase contract as v4 (safe to drop-in)
// ============================================================

// ── Supabase ──
const SUPABASE_URL = 'https://wpwlbulloksrspbpclmt.supabase.co';
const SUPABASE_ANON = 'sb_publishable_fXJKvM-vxOvXb-yFntMXdw_JU0DCjKJ';
const API = SUPABASE_URL + '/rest/v1';
const AUTH = SUPABASE_URL + '/auth/v1';

const USER_ACCOUNTS = {
  'raylan': { email: 'raylan@learningtracker.app', name: 'Raylan' },
  'scarlett': { email: 'scarlett@learningtracker.app', name: 'Scarlett' },
};

const STORAGE_KEY = 'learning_tracker_v5';
const TARGET = 30;
const GRID_SIZE = 60;

// Task color palette (semantic, tied to design system)
const TASK_COLORS = [
  { key: 'blue',   hex: '#4a7dff' },
  { key: 'green',  hex: '#3ec177' },
  { key: 'purple', hex: '#a668e0' },
  { key: 'orange', hex: '#ef8a3d' },
  { key: 'red',    hex: '#e5564b' },
  { key: 'yellow', hex: '#f5b740' },
];
function taskColor(task) {
  if (task && task.color) {
    const found = TASK_COLORS.find(c => c.key === task.color);
    if (found) return found.hex;
  }
  // stable hash fallback
  const id = (task && task.id) || '';
  let h = 0; for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
  return TASK_COLORS[h % TASK_COLORS.length].hex;
}

let sessionToken = null;
let sessionUser = null;
let user = null;
let tasks = [];
let sessions = {};
let calendarTasks = {};
let todayKey = '';
let selectedDate = '';
let calYear = 0, calMonth = 0;
let currentModalMode = '';
let currentModalTaskId = '';
let cardOpenState = {};
let syncDebounceTimer = null;

// Restore session
try {
  const saved = localStorage.getItem('lt_session');
  if (saved) {
    const s = JSON.parse(saved);
    if (s.expires_at && s.expires_at > Date.now()) {
      sessionToken = s.access_token;
      sessionUser = s.user;
    } else {
      localStorage.removeItem('lt_session');
    }
  }
} catch { /* ignore */ }

// ── API ──
async function apiLogin(email, password) {
  const res = await fetch(AUTH + '/token?grant_type=password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', apikey: SUPABASE_ANON },
    body: JSON.stringify({ email, password })
  });
  if (!res.ok) throw new Error('Login failed');
  return await res.json();
}

async function apiLoadData(userId) {
  const res = await fetch(API + '/learning_tracker_data?user_id=eq.' + userId + '&limit=1', {
    headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + sessionToken }
  });
  if (!res.ok) throw new Error('Load failed');
  const data = await res.json();
  return data[0] || null;
}

async function apiSaveData(userId, payload) {
  const res = await fetch(API + '/learning_tracker_data', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: SUPABASE_ANON,
      Authorization: 'Bearer ' + sessionToken,
      Prefer: 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ user_id: userId, ...payload })
  });
  if (!res.ok) throw new Error('Save failed: ' + (await res.text()));
  const text = await res.text();
  return text ? JSON.parse(text) : {};
}

// ── Auth ──
async function checkSession() {
  if (sessionToken && sessionUser) {
    user = sessionUser;
    loadFromLocal();      // instant — whatever we cached last time
    showApp();
    initApp();            // wire up UI now, don't wait for network
    loadFromCloud();      // background: may overwrite + re-render when done
  } else {
    showAuth();
    setTimeout(() => document.getElementById('authUser').focus(), 200);
  }
}

function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

function setAuthError(msg) {
  const errEl = document.getElementById('authError');
  errEl.textContent = msg;
  errEl.classList.toggle('show', !!msg);
}

function setInputInvalid(id, invalid) {
  document.getElementById(id).classList.toggle('invalid', !!invalid);
}

document.getElementById('authLoginBtn').addEventListener('click', async () => {
  const userEl = document.getElementById('authUser');
  const passEl = document.getElementById('authPass');
  const username = userEl.value.trim().toLowerCase();
  const password = passEl.value;
  const btn = document.getElementById('authLoginBtn');

  setInputInvalid('authUser', false);
  setInputInvalid('authPass', false);

  if (!username) { setAuthError('请输入账号'); setInputInvalid('authUser', true); return; }
  if (!password) { setAuthError('请输入密码'); setInputInvalid('authPass', true); return; }

  const account = USER_ACCOUNTS[username];
  if (!account) {
    setAuthError('账号不存在');
    setInputInvalid('authUser', true);
    return;
  }

  setAuthError('');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('.label').textContent = '登录中';

  try {
    const data = await apiLogin(account.email, password);
    sessionToken = data.access_token;
    sessionUser = data.user;
    user = data.user;
    localStorage.setItem('lt_session', JSON.stringify({
      access_token: data.access_token,
      user: data.user,
      expires_at: Date.now() + data.expires_in * 1000
    }));
    showApp();
    loadFromLocal();
    initApp();
    loadFromCloud();
  } catch (e) {
    setAuthError('密码错误,请重试');
    setInputInvalid('authPass', true);
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.querySelector('.label').textContent = '登录';
  }
});

document.getElementById('authPass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('authLoginBtn').click();
});
document.getElementById('authUser').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('authPass').focus();
});
document.getElementById('authUser').addEventListener('input', () => {
  setInputInvalid('authUser', false); setAuthError('');
});
document.getElementById('authPass').addEventListener('input', () => {
  setInputInvalid('authPass', false); setAuthError('');
});

// ── Cloud Sync ──
// Read whatever is cached locally (fast, synchronous-ish, no network).
// Accepts v4 key as legacy fallback.
function loadFromLocal() {
  try {
    const localRaw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('learning_tracker_v4');
    if (localRaw) {
      const local = JSON.parse(localRaw);
      tasks = local.tasks || [];
      sessions = local.sessions || {};
      calendarTasks = local.calendar_tasks || {};
      countdowns = local.countdowns || [];
      return true;
    }
  } catch { /* ignore */ }
  return false;
}

// Fetch cloud state in the background. If successful, overwrite in-memory
// state with the cloud version and re-render. If it fails (offline, timeout,
// auth issue), we keep whatever local state we already have and flag sync.
async function loadFromCloud({ silent = false } = {}) {
  if (!user) return;
  if (!silent) setSyncStatus('syncing', '同步中');
  try {
    const row = await apiLoadData(user.id);
    if (row && row.tasks) {
      tasks = row.tasks;
      sessions = row.sessions || {};
      calendarTasks = row.calendar_tasks || {};
      countdowns = row.countdowns || [];
      // Mirror to local cache so next launch is instant.
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, sessions, calendar_tasks: calendarTasks, countdowns }));
        localStorage.setItem('lt_countdowns', JSON.stringify(countdowns));
      } catch {}
      // Re-render if the app has already mounted.
      if (_initialized) {
        loadCountdowns(); renderCountdown();
        renderCalendar(); renderGrid(); renderStats();
      }
    } else {
      // No cloud row yet — push whatever we have locally so next device sees it.
      setTimeout(saveToCloud, 1500);
    }
    setSyncStatus('online', '已同步');
  } catch (e) {
    console.error('Cloud load failed:', e);
    setSyncStatus('error', '同步失败');
  }
}

async function saveToCloud() {
  if (!user) return;
  setSyncStatus('syncing', '同步中');
  try {
    await apiSaveData(user.id, { tasks, sessions, calendar_tasks: calendarTasks, countdowns });
    setSyncStatus('online', '已同步');
  } catch (e) {
    console.error('Cloud save failed:', e);
    setSyncStatus('error', '同步失败');
  }
}

function debouncedCloudSave() {
  if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => saveToCloud(), 1500);
}

function saveLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, sessions, calendar_tasks: calendarTasks, countdowns }));
  } catch {}
  debouncedCloudSave();
}

// ── Init ──
let _initialized = false;
function initApp() {
  if (_initialized) return;
  _initialized = true;
  todayKey = getTodayKey();
  selectedDate = todayKey;
  calYear = new Date().getFullYear();
  calMonth = new Date().getMonth();
  renderHeaderDate();
  loadCountdowns(); bindCountdownEvents(); renderCountdown();
  renderCalendar();
  renderGrid();
  renderStats();
  bindEvents();
  setInterval(checkDayChange, 60000);

  // scroll shadow on header
  window.addEventListener('scroll', () => {
    document.getElementById('appHeader').classList.toggle('scrolled', window.scrollY > 4);
  }, { passive: true });

    // Kill all old SWs and register fresh one (force clear stale cache)
    }).finally(() => {
    });
  }
}

// ── Utils ──
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateCN(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${d.getMonth()+1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderHeaderDate() {
  document.getElementById('headerDate').textContent = formatDateCN(todayKey);
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '正在同步…';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function setSyncStatus(type, text) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-pill ' + (type === 'online' ? '' : type);
  document.getElementById('syncLabel').textContent = text;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

function haptic() {
  if (navigator.vibrate) navigator.vibrate(10);
}

// ── Calendar ──
function renderCalendar() {
  const title = document.getElementById('calTitle');
  title.textContent = `${calYear}年${calMonth + 1}月`;
  const container = document.getElementById('calDays');
  container.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  for (let i = firstDay - 1; i >= 0; i--) {
    const div = document.createElement('div');
    div.className = 'cal-day other-month';
    div.textContent = prevDays - i;
    container.appendChild(div);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const div = document.createElement('div');
    div.className = 'cal-day';
    div.textContent = d;
    if (dateStr === todayKey) div.classList.add('today');
    if (dateStr === selectedDate) div.classList.add('selected');
    const hasSessions = sessions[dateStr] && sessions[dateStr].length > 0;
    const hasCalTasks = calendarTasks[dateStr] && calendarTasks[dateStr].some(ct => ct.done);
    if (hasSessions || hasCalTasks) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      div.appendChild(dot);
    }
    div.addEventListener('click', () => {
      selectedDate = dateStr;
      renderCalendar();
    });
    container.appendChild(div);
  }
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const div = document.createElement('div');
    div.className = 'cal-day other-month';
    div.textContent = i;
    container.appendChild(div);
  }
  renderCalendarTasks();
}

// ── Day Detail ──
function renderCalendarTasks() {
  const container = document.getElementById('dayDetail');
  const dayCalTasks = calendarTasks[selectedDate] || [];
  const doneCount = dayCalTasks.filter(ct => ct.done).length;
  const total = dayCalTasks.length;

  let html = `
    <div class="day-detail">
      <div class="day-detail-header">
        <span class="date-label">${formatDateCN(selectedDate)}</span>
        ${total > 0 ? `<span class="date-count">${doneCount}/${total}</span>` : ''}
      </div>`;

  if (dayCalTasks.length === 0) {
    html += `<div class="day-empty">今天还没有计划,点下方添加</div>`;
  } else {
    html += `<div class="calendar-task-list">`;
    dayCalTasks.forEach((ct, i) => {
      html += `
        <div class="calendar-task-item">
          <label class="calendar-task-checkbox">
            <input type="checkbox" ${ct.done ? 'checked' : ''} data-ct-check="${selectedDate}|${i}" />
            <span class="cb"><svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5L9.5 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <span class="calendar-task-name ${ct.done ? 'done' : ''}">${escHtml(ct.name)}</span>
          </label>
          <button class="calendar-task-delete" data-ct-del="${selectedDate}|${i}" aria-label="删除">
            <svg viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>`;
    });
    html += `</div>`;
  }
  html += `
      <button class="add-inline-btn" id="addCalTaskBtn">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        添加计划
      </button>
    </div>`;
  container.innerHTML = html;

  document.getElementById('addCalTaskBtn').addEventListener('click', () => openCalendarTaskModal());

  container.querySelectorAll('[data-ct-check]').forEach(el => {
    el.addEventListener('change', () => {
      const [d, i] = el.dataset.ctCheck.split('|');
      toggleCalendarTask(d, parseInt(i));
      haptic();
    });
  });
  container.querySelectorAll('[data-ct-del]').forEach(el => {
    el.addEventListener('click', () => {
      const [d, i] = el.dataset.ctDel.split('|');
      deleteCalendarTask(d, parseInt(i));
    });
  });
  renderCarryForward();
}

// ── Grid ──
function renderGrid() {
  const list = document.getElementById('taskList');
  const hint = document.getElementById('emptyHint');
  if (tasks.length === 0) {
    hint.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  hint.style.display = 'none';
  const taskIds = new Set(tasks.map(t => t.id));
  list.querySelectorAll('.task-card').forEach(el => { if (!taskIds.has(el.dataset.id)) el.remove(); });
  tasks.forEach(task => {
    let card = list.querySelector(`.task-card[data-id="${task.id}"]`);
    const isNew = !card;
    if (isNew) {
      card = document.createElement('div');
      card.className = 'task-card';
      card.dataset.id = task.id;
      list.appendChild(card);
    }
    const wasOpen = card.classList.contains('open');
    const oldSubStates = {};
    card.querySelectorAll('.subtask-item.open').forEach(el => { oldSubStates[el.dataset.subIdx] = true; });
    card.innerHTML = buildCardHTML(task);
    if (wasOpen || cardOpenState[task.id]) card.classList.add('open');
    Object.keys(oldSubStates).forEach(idx => {
      const subEl = card.querySelector(`.subtask-item[data-sub-idx="${idx}"]`);
      if (subEl) subEl.classList.add('open');
    });
  });
  bindCardEvents();
}

function buildCardHTML(task) {
  const subtasks = task.subtasks || [];
  let totalDone = 0, totalToday = 0, totalBonus = 0;
  subtasks.forEach(st => {
    st.cells.forEach((c, ci) => {
      if (c.done) {
        totalDone++;
        if (ci >= TARGET) totalBonus++;
        if (c.doneToday) totalToday++;
      }
    });
  });
  const pct = Math.min((totalDone / Math.max(TARGET, 1)) * 100, 100);

  let subtasksHTML = '';
  subtasks.forEach((st, si) => {
    const stDone = st.cells.filter(c => c.done).length;
    const stPct = Math.min((stDone / TARGET) * 100, 100);
    let stCellsHTML = '';
    st.cells.forEach((c, ci) => {
      let cls = 'pending';
      if (c.done) {
        if (ci >= TARGET) cls = 'bonus';
        else if (c.doneToday) cls = 'today';
        else cls = 'done';
      }
      stCellsHTML += `<div class="cell ${cls}" data-task="${task.id}" data-sub="${si}" data-cell="${ci}">${ci+1}</div>`;
    });
    subtasksHTML += `
      <div class="subtask-item" data-sub-idx="${si}">
        <div class="subtask-header" data-sub-toggle="${task.id}-${si}">
          <span class="subtask-name">${escHtml(st.name)}</span>
          <div class="subtask-meta">
            <span>${stDone}/${TARGET}</span>
            <div class="subtask-progress-wrap"><div class="subtask-progress-fill" style="width:${stPct}%"></div></div>
          </div>
          <svg class="subtask-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="subtask-body">
          <div class="subtask-body-inner">
            <div class="grid">${stCellsHTML}</div>
            <div class="quick-chips">
              <button class="chip" data-quick="${task.id}|${si}|1">+1 打卡</button>
              <button class="chip" data-quick="${task.id}|${si}|5">+5</button>
              <button class="chip" data-quick="${task.id}|${si}|10">+10</button>
            </div>
            <div class="subtask-actions">
              <button class="mini-btn" data-undo="${task.id}|${si}">撤销今日最后一格</button>
              <button class="mini-btn danger" data-del-sub="${task.id}-${si}">删除子任务</button>
            </div>
          </div>
        </div>
      </div>`;
  });

  const metaTags = [];
  if (totalToday > 0) metaTags.push(`<span class="tag today">●${totalToday} 今日</span>`);
  if (totalBonus > 0) metaTags.push(`<span class="tag bonus">+${totalBonus} 超额</span>`);

  const legendHTML = `
    <div class="legend-strip">
      <span class="legend-item"><span class="legend-dot" style="background:var(--cell-pending)"></span>未完成</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>已完成</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--yellow)"></span>今日</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--purple)"></span>超额</span>
      <div class="legend-hint">点格子打卡 · 长按撤销今日最后一格</div>
    </div>`;

  return `
    <div class="task-header" data-task-toggle="${task.id}">
      <div class="task-color-bar" style="background:${taskColor(task)}"></div>
      <div class="task-info">
        <div class="task-name">${escHtml(task.name)}</div>
        <div class="task-meta">
          <span class="count">${totalDone}</span><span class="sep">/ ${TARGET}</span>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:${taskColor(task)}"></div></div>
          <span class="sep">· ${subtasks.length} 个子任务</span>
          ${metaTags.join('')}
        </div>
      </div>
      <svg class="task-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="task-body">
      <div class="task-body-inner">
        ${legendHTML}
        <div class="subtasks-section">${subtasksHTML || '<div style="padding:8px 4px 4px;font-size:13px;color:var(--text-tertiary);">还没有子任务,点下方按钮添加</div>'}</div>
        <div class="task-color-row" data-task-colors="${task.id}">
          ${TASK_COLORS.map(c => `<span class="swatch ${(task.color||'')===c.key?'sel':''}" data-pick-color="${task.id}|${c.key}" style="background:${c.hex}"></span>`).join('')}
        </div>
        <div class="task-card-footer">
          <button class="add-subtask-btn" data-add-sub="${task.id}">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            添加子任务
          </button>
          <button class="delete-task-btn" data-del-task="${task.id}">删除</button>
        </div>
      </div>
    </div>`;
}

function bindCardEvents() {
  document.querySelectorAll('[data-task-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.taskToggle;
      const card = el.closest('.task-card');
      cardOpenState[id] = !cardOpenState[id];
      card.classList.toggle('open', cardOpenState[id]);
    });
  });
  document.querySelectorAll('[data-sub-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      el.closest('.subtask-item').classList.toggle('open');
    });
  });
  document.querySelectorAll('.cell').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      addProgress(el.dataset.task, parseInt(el.dataset.sub));
      haptic();
    });
    let timer;
    const startLong = () => {
      timer = setTimeout(() => {
        undoLastYellow(el.dataset.task, parseInt(el.dataset.sub));
        haptic();
        toast('已撤销今日最后一格');
      }, 550);
    };
    el.addEventListener('touchstart', startLong, { passive: true });
    el.addEventListener('touchend', () => clearTimeout(timer));
    el.addEventListener('touchmove', () => clearTimeout(timer));
    el.addEventListener('mousedown', startLong);
    el.addEventListener('mouseup', () => clearTimeout(timer));
    el.addEventListener('mouseleave', () => clearTimeout(timer));
  });
  document.querySelectorAll('[data-quick]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const [taskId, subIdx, n] = el.dataset.quick.split('|');
      for (let i = 0; i < parseInt(n); i++) addProgress(taskId, parseInt(subIdx), false);
      saveLocal(); renderGrid(); renderCalendar();
      haptic();
      toast(`+${n} 已打卡`);
    });
  });
  document.querySelectorAll('[data-undo]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const [taskId, subIdx] = el.dataset.undo.split('|');
      undoLastYellow(taskId, parseInt(subIdx));
      toast('已撤销');
    });
  });
  document.querySelectorAll('[data-add-sub]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openSubtaskModal(el.dataset.addSub); });
  });
  document.querySelectorAll('[data-del-sub]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const parts = el.dataset.delSub.split('-');
      const subIdxStr = parts.pop();
      const taskIdd = parts.join('-');
      if (confirm('确定删除这个子任务?')) deleteSubtask(taskIdd, parseInt(subIdxStr));
    });
  });
  document.querySelectorAll('[data-del-task]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('确定删除这个任务?')) deleteTask(el.dataset.delTask);
    });
  });
  document.querySelectorAll('[data-pick-color]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const [taskId, colorKey] = el.dataset.pickColor.split('|');
      const t = tasks.find(x => x.id === taskId);
      if (!t) return;
      t.color = (t.color === colorKey) ? null : colorKey;
      saveLocal(); renderGrid(); renderStats();
      haptic();
    });
  });
}

function addProgress(taskId, subIdx, persist = true) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks[subIdx]) return;
  const sub = task.subtasks[subIdx];
  const prevDone = sub.cells.filter(c => c.done).length;
  for (let i = 0; i < sub.cells.length; i++) {
    if (!sub.cells[i].done) {
      sub.cells[i].done = true;
      sub.cells[i].doneToday = true;
      // Track session for heatmap/stats
      if (!sessions[todayKey]) sessions[todayKey] = [];
      sessions[todayKey].push({ t: Date.now(), task: taskId, sub: subIdx });
      const nowDone = prevDone + 1;
      if (nowDone === TARGET) {
        celebrate(taskColor(task));
        toast(`🎉 「${task.name} · ${sub.name}」达成 30`);
      } else if (nowDone === TARGET + 30) {
        celebrate('#a668e0');
        toast(`💜 双倍达成！60 / 60`);
      }
      break;
    }
  }
  if (persist) {
    saveLocal(); renderGrid(); renderCalendar(); renderStats();
  }
}

// Confetti celebration
function celebrate(tint) {
  const root = document.createElement('div');
  root.className = 'confetti-root';
  const colors = [tint || '#4a7dff', '#3ec177', '#f5b740', '#a668e0', '#ef8a3d'];
  for (let i = 0; i < 42; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const c = colors[i % colors.length];
    p.style.background = c;
    p.style.left = (Math.random() * 100) + '%';
    p.style.top = (-10 - Math.random() * 20) + 'px';
    p.style.animationDelay = (Math.random() * 0.2) + 's';
    p.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
    p.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) p.style.borderRadius = '50%';
    root.appendChild(p);
  }
  document.body.appendChild(root);
  haptic();
  setTimeout(() => root.remove(), 2200);
}

function undoLastYellow(taskId, subIdx) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks[subIdx]) return;
  const sub = task.subtasks[subIdx];
  for (let i = sub.cells.length - 1; i >= 0; i--) {
    if (sub.cells[i].doneToday) {
      sub.cells[i].done = false;
      sub.cells[i].doneToday = false;
      break;
    }
  }
  saveLocal(); renderGrid(); renderCalendar();
}

// ── Stats ──
function computeStats() {
  // per-day session counts (use both tracked sessions and fallback: just counts of doneToday across saves)
  // streak: consecutive days with >=1 activity ending today or yesterday
  const today = new Date(todayKey + 'T00:00:00');
  const dayCount = {};
  Object.keys(sessions || {}).forEach(k => {
    dayCount[k] = (sessions[k] || []).length;
  });
  Object.keys(calendarTasks || {}).forEach(k => {
    const done = (calendarTasks[k] || []).filter(c => c.done).length;
    if (done > 0) dayCount[k] = (dayCount[k] || 0) + done;
  });

  // streak
  let streak = 0;
  let cur = new Date(today);
  // allow a single-day grace: if today=0 but yesterday>0, streak starts at yesterday
  if (!dayCount[fmtKey(cur)]) cur.setDate(cur.getDate() - 1);
  while (dayCount[fmtKey(cur)]) {
    streak++;
    cur.setDate(cur.getDate() - 1);
  }

  // longest streak (scan all keys)
  const allDays = Object.keys(dayCount).sort();
  let longest = 0, run = 0, prev = null;
  allDays.forEach(k => {
    if (!dayCount[k]) return;
    if (prev && (new Date(k) - new Date(prev)) === 86400000) run++; else run = 1;
    if (run > longest) longest = run;
    prev = k;
  });

  // totals
  let totalCells = 0, totalToday = 0;
  tasks.forEach(t => (t.subtasks || []).forEach(st => st.cells.forEach(c => {
    if (c.done) { totalCells++; if (c.doneToday) totalToday++; }
  })));

  return { streak, longest, totalCells, totalToday, dayCount };
}

function fmtKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderStats() {
  const container = document.getElementById('statsContent');
  if (!container) return;
  const { streak, longest, totalCells, totalToday, dayCount } = computeStats();

  if (tasks.length === 0 && Object.keys(dayCount).length === 0) {
    container.innerHTML = `
      <div class="stats-empty">
        还没有数据,先去网格打卡一下吧
      </div>`;
    return;
  }

  // 13-week heatmap (91 days) ending today
  const weeks = 13;
  const days = weeks * 7;
  const end = new Date(todayKey + 'T00:00:00');
  // align so last column is current week, bottom row is today's weekday
  const gridStart = new Date(end);
  gridStart.setDate(gridStart.getDate() - (days - 1));
  // shift start back to a Sunday for column alignment
  gridStart.setDate(gridStart.getDate() - gridStart.getDay());
  const cells = [];
  const cellDate = new Date(gridStart);
  const weekdayLabels = ['日','','二','','四','','六'];
  // build column-major so it reads like GitHub
  const columns = [];
  const totalCols = Math.ceil((days + gridStart.getDay()) / 7) + 1;
  for (let col = 0; col < totalCols; col++) {
    const colCells = [];
    for (let row = 0; row < 7; row++) {
      const d = new Date(gridStart);
      d.setDate(d.getDate() + col * 7 + row);
      colCells.push(d);
    }
    columns.push(colCells);
  }

  // compute max for scaling
  const counts = Object.values(dayCount);
  const max = counts.length ? Math.max(...counts) : 0;
  const level = (n) => {
    if (!n) return 0;
    if (max <= 1) return n ? 4 : 0;
    const r = n / max;
    if (r > 0.75) return 4;
    if (r > 0.5)  return 3;
    if (r > 0.25) return 2;
    return 1;
  };

  // Layout: 7 rows (weekday cols) × N cols in a CSS grid. We'll arrange by row=weekday, col=week.
  // Build a grid of html cells per row.
  const rowsHtml = [];
  for (let row = 0; row < 7; row++) {
    let rowHtml = `<div class="hm-wd">${weekdayLabels[row]}</div>`;
    for (let col = 0; col < totalCols; col++) {
      const d = columns[col][row];
      const k = fmtKey(d);
      const n = dayCount[k] || 0;
      const lvl = level(n);
      const isFuture = d > end;
      const isToday = k === todayKey;
      let cls = 'hm-cell';
      if (isFuture) cls += ' future';
      else if (lvl) cls += ' l' + lvl;
      if (isToday) cls += ' today-mark';
      const title = isFuture ? k : `${k} · ${n} 次`;
      rowHtml += `<div class="${cls}" title="${title}"></div>`;
    }
    rowsHtml.push(rowHtml);
  }

  const heatmapHTML = `
    <div class="heatmap" style="--weeks:${totalCols}">
      ${rowsHtml.join('')}
    </div>
    <div class="heatmap-foot">
      <span>近 ${weeks} 周 · 每格一天</span>
      <span class="heatmap-scale">
        少
        <span class="sq"></span>
        <span class="sq" style="background:color-mix(in srgb, var(--green) 28%, var(--cell-pending))"></span>
        <span class="sq" style="background:color-mix(in srgb, var(--green) 55%, var(--cell-pending))"></span>
        <span class="sq" style="background:color-mix(in srgb, var(--green) 80%, var(--cell-pending))"></span>
        <span class="sq" style="background:var(--green)"></span>
        多
      </span>
    </div>`;

  // per-task ranking
  const ranked = tasks.map(t => {
    let done = 0;
    (t.subtasks || []).forEach(st => st.cells.forEach(c => { if (c.done) done++; }));
    return { task: t, done };
  }).sort((a, b) => b.done - a.done);

  const maxRank = Math.max(1, ...ranked.map(r => r.done));
  const rankHTML = ranked.length ? `
    <div class="task-rank">
      ${ranked.map(r => {
        const color = taskColor(r.task);
        const pct = (r.done / maxRank) * 100;
        return `
          <div>
            <div class="task-rank-row">
              <span class="swatch" style="background:${color}"></span>
              <span class="name">${escHtml(r.task.name)}</span>
              <span class="count">${r.done}</span>
            </div>
            <div class="task-rank-row" style="margin-top:4px;">
              <div class="bar-wrap" style="grid-column:2 / -1;">
                <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>
  ` : `<div class="stats-empty" style="padding:20px 0;">还没有任务</div>`;

  // Milestones (lifetime cells)
  const milestones = [10, 30, 60, 100, 300, 500, 1000];
  const msHTML = milestones.map(m => `
    <div class="milestone ${totalCells >= m ? 'hit' : ''}">
      <span class="ms-dot"></span>${m}
    </div>`).join('');

  container.innerHTML = `
    <div class="stats-hero">
      <div class="stat-kpi streak">
        <div class="num">${streak}<span class="unit">天</span></div>
        <div class="label">连续</div>
      </div>
      <div class="stat-kpi today">
        <div class="num">${totalToday}</div>
        <div class="label">今日</div>
      </div>
      <div class="stat-kpi total">
        <div class="num">${totalCells}</div>
        <div class="label">累计</div>
      </div>
    </div>

    <div class="stats-section">
      <h3>活跃热力 <span class="sub">最长 ${longest} 天</span></h3>
      ${heatmapHTML}
    </div>

    <div class="stats-section">
      <h3>任务排名 <span class="sub">按累计格子数</span></h3>
      ${rankHTML}
    </div>

    <div class="stats-section">
      <h3>里程碑 <span class="sub">累计 ${totalCells}</span></h3>
      <div class="milestone-strip">${msHTML}</div>
    </div>
  `;
}

// ── Carry-forward ──
let carryDismissedKey = null;
function renderCarryForward() {
  const container = document.getElementById('dayDetail');
  if (!container || selectedDate !== todayKey) return;
  // Find yesterday's incomplete plans
  const y = new Date(todayKey + 'T00:00:00');
  y.setDate(y.getDate() - 1);
  const yKey = fmtKey(y);
  const yPlans = (calendarTasks[yKey] || []).filter(c => !c.done);
  if (yPlans.length === 0) return;
  if (carryDismissedKey === todayKey) return;

  // Only show if today has no plans yet, or to offer a bring-forward
  const node = document.createElement('div');
  node.className = 'carry-card';
  node.innerHTML = `
    <div class="carry-icon">↻</div>
    <div class="carry-text">昨日还有 ${yPlans.length} 条未完成</div>
    <button class="carry-btn" id="carryBringBtn">全部带过来</button>
    <button class="carry-dismiss" id="carryDismissBtn" aria-label="关闭">×</button>
  `;
  container.insertBefore(node, container.firstChild);
  document.getElementById('carryBringBtn').addEventListener('click', () => {
    if (!calendarTasks[todayKey]) calendarTasks[todayKey] = [];
    yPlans.forEach(p => {
      calendarTasks[todayKey].push({ id: Date.now().toString() + Math.random().toString(36).slice(2,5), name: p.name, done: false });
    });
    saveLocal(); renderCalendar(); renderCalendarTasks();
    toast(`已带过 ${yPlans.length} 条`);
    haptic();
  });
  document.getElementById('carryDismissBtn').addEventListener('click', () => {
    carryDismissedKey = todayKey;
    node.remove();
  });
}

// ── Calendar Tasks ──
function openCalendarTaskModal() {
  currentModalMode = 'add-calendar-task';
  document.getElementById('modalTitle').textContent = '添加计划';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="今天要做什么…" maxlength="50" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) inp.focus(); }, 220);
}
function addCalendarTask(name) {
  if (!calendarTasks[selectedDate]) calendarTasks[selectedDate] = [];
  calendarTasks[selectedDate].push({ id: Date.now().toString(), name, done: false });
  saveLocal(); renderCalendar(); renderCalendarTasks();
}
function toggleCalendarTask(date, idx) {
  if (calendarTasks[date] && calendarTasks[date][idx]) {
    calendarTasks[date][idx].done = !calendarTasks[date][idx].done;
    saveLocal(); renderCalendar(); renderCalendarTasks();
  }
}
function deleteCalendarTask(date, idx) {
  if (calendarTasks[date]) {
    calendarTasks[date].splice(idx, 1);
    if (calendarTasks[date].length === 0) delete calendarTasks[date];
    saveLocal(); renderCalendar(); renderCalendarTasks();
  }
}

// ── Task CRUD ──
function addTask(name) {
  const id = Date.now().toString();
  tasks.push({ id, name, subtasks: [], _lastDate: todayKey });
  cardOpenState[id] = true;
  saveLocal(); renderGrid(); renderCalendar();
  toast('已添加任务');
}
function addSubtask(taskId, name) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!task.subtasks) task.subtasks = [];
  task.subtasks.push({
    id: `st-${Date.now()}`,
    name,
    cells: Array(GRID_SIZE).fill(null).map(() => ({ done: false, doneToday: false, bonus: false }))
  });
  cardOpenState[taskId] = true;
  saveLocal(); renderGrid();
  toast('已添加子任务');
}
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  delete cardOpenState[id];
  saveLocal(); renderGrid();
}
function deleteSubtask(taskId, subIdx) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks[subIdx]) return;
  task.subtasks.splice(subIdx, 1);
  saveLocal(); renderGrid();
}

function checkDayChange() {
  const current = getTodayKey();
  if (current !== todayKey) {
    todayKey = current;
    renderHeaderDate();
  }
  if (tasks.length > 0 && tasks[0]._lastDate !== current) {
    tasks.forEach(t => {
      if (t.subtasks) {
        t.subtasks.forEach(st => { st.cells.forEach(c => { c.doneToday = false; }); });
      }
      t._lastDate = current;
    });
    saveLocal(); renderGrid(); renderCalendar();
  }
}

// ── Modals ──
function openTaskModal() {
  currentModalMode = 'add-task';
  document.getElementById('modalTitle').textContent = '新建任务';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="任务名称,例如:英语阅读" maxlength="30" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) inp.focus(); }, 220);
}
function openSubtaskModal(taskId) {
  currentModalMode = 'add-subtask';
  currentModalTaskId = taskId;
  document.getElementById('modalTitle').textContent = '添加子任务';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="子任务名称,例如:精读文章" maxlength="30" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) inp.focus(); }, 220);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function handleModalConfirm() {
  const input = document.getElementById('modalInput');
  if (!input) return;
  const value = input.value.trim();
  if (!value) { input.focus(); return; }
  switch (currentModalMode) {
    case 'add-task': addTask(value); break;
    case 'add-subtask': addSubtask(currentModalTaskId, value); break;
    case 'add-calendar-task': addCalendarTask(value); break;
  }
  closeModal();
}

// ── Events ──
function bindEvents() {
  const indicator = document.getElementById('tabIndicator');
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab + 'Page').classList.add('active');
      indicator.dataset.tab = btn.dataset.tab;
      updateFabText();
      if (btn.dataset.tab === 'stats') renderStats();
      if (btn.dataset.tab === 'countdown') renderCountdown();
    });
  });

  document.getElementById('calPrev').addEventListener('click', () => {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  });
  document.getElementById('calToday').addEventListener('click', () => {
    const d = new Date();
    calYear = d.getFullYear(); calMonth = d.getMonth();
    selectedDate = todayKey;
    renderCalendar();
  });

  document.getElementById('addBtn').addEventListener('click', () => {
    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
    if (activeTab === 'calendar') openCalendarTaskModal();
    else openTaskModal();
  });

  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalConfirm').addEventListener('click', handleModalConfirm);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('show')) handleModalConfirm();
    if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('show')) closeModal();
  });

  window.addEventListener('online', () => setSyncStatus('online', '已同步'));
  window.addEventListener('offline', () => setSyncStatus('offline', '离线'));

  // Theme toggle
  const themeBtn = document.getElementById('themeBtn');
  const themeMenu = document.getElementById('themeMenu');
  const applyThemeUI = () => {
    const t = localStorage.getItem('lt_theme') || 'auto';
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeIconSun').style.display  = t === 'light' ? 'block' : 'none';
    document.getElementById('themeIconMoon').style.display = t === 'dark'  ? 'block' : 'none';
    document.getElementById('themeIconAuto').style.display = t === 'auto'  ? 'block' : 'none';
    themeMenu.querySelectorAll('.theme-opt').forEach(o => {
      o.classList.toggle('sel', o.dataset.themeSet === t);
    });
    // Sync meta theme-color
    const isDark = t === 'dark' || (t === 'auto' && document.documentElement.getAttribute('data-system-dark') === '1');
    document.querySelectorAll('meta[name="theme-color"]').forEach(m => m.remove());
    const meta = document.createElement('meta');
    meta.name = 'theme-color';
    meta.content = isDark ? '#15151a' : '#fafafc';
    document.head.appendChild(meta);
  };
  applyThemeUI();
  themeBtn.addEventListener('click', e => {
    e.stopPropagation();
    themeMenu.classList.toggle('show');
  });
  themeMenu.querySelectorAll('[data-theme-set]').forEach(opt => {
    opt.addEventListener('click', () => {
      localStorage.setItem('lt_theme', opt.dataset.themeSet);
      applyThemeUI();
      themeMenu.classList.remove('show');
      haptic();
    });
  });
  // React to system changes if in auto mode
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change', () => {
    if ((localStorage.getItem('lt_theme') || 'auto') === 'auto') applyThemeUI();
  });

  // User menu
  const userBtn = document.getElementById('userBtn');
  const userMenu = document.getElementById('userMenu');
  const userBadgeInitial = document.getElementById('userBadgeInitial');
  const userMenuName = document.getElementById('userMenuName');
  const email = (user && user.email) || '';
  const username = email.split('@')[0] || 'me';
  const nameMap = { raylan: 'Raylan', scarlett: 'Scarlett' };
  const displayName = nameMap[username] || username;
  userBadgeInitial.textContent = displayName.charAt(0).toUpperCase();
  userMenuName.textContent = displayName;

  userBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = userMenu.classList.contains('show');
    userMenu.classList.toggle('show');
    themeMenu.classList.remove('show');
  });

  // Stop propagation for all items inside menus so document handler doesn't close them
  userMenu.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', e => e.stopPropagation());
  });
  themeMenu.querySelectorAll('.theme-opt').forEach(item => {
    item.addEventListener('click', e => e.stopPropagation());
  });

  // Click-outside handler — only closes menus when clicking truly outside
  document.addEventListener('click', e => {
    if (!userMenu.contains(e.target) && e.target !== userBtn) userMenu.classList.remove('show');
    if (!themeMenu.contains(e.target) && e.target !== themeBtn) themeMenu.classList.remove('show');
  });

  // Export / Import
  document.getElementById('exportBtn').addEventListener('click', () => {
    exportData();
    userMenu.classList.remove('show');
  });
  document.getElementById('importBtn').addEventListener('click', () => {
    importFileInput.click();
    userMenu.classList.remove('show');
  });

  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
    userMenu.classList.remove('show');
    setTimeout(() => {
      if (confirm('确定退出登录?')) {
        localStorage.removeItem('lt_session');
        location.reload();
      }
    }, 150);
  });

  updateFabText();
}

function updateFabText() {
  const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
  const fabGroup = document.querySelector('.fab-group');
  const label = document.getElementById('fabLabel');
  if (activeTab === 'stats' || activeTab === 'countdown') {
    fabGroup.style.display = 'none';
    return;
  }
  fabGroup.style.display = '';
  label.textContent = activeTab === 'calendar' ? '添加计划' : '添加任务';
}

// ── Countdown ──
let countdowns = [];

function loadCountdowns() {
  try {
    const saved = localStorage.getItem('lt_countdowns');
    if (saved) countdowns = JSON.parse(saved);
  } catch(e) { countdowns = []; }
}

function saveCountdowns() {
  localStorage.setItem('lt_countdowns', JSON.stringify(countdowns));
  saveLocal();
}

function renderCountdown() {
  const container = document.getElementById('countdownList');
  if (!container) return;
  if (countdowns.length === 0) {
    container.innerHTML = `<div class="countdown-empty">还没有倒计时<br><span style="font-size:12px;margin-top:6px;display:inline-block;opacity:0.7;">点击「添加」创建第一个</span></div>`;
    return;
  }
  const today = new Date();
  today.setHours(0,0,0,0);
  const sorted = countdowns.slice().sort((a,b) => {
    const da = new Date(a.date + 'T00:00:00');
    const db = new Date(b.date + 'T00:00:00');
    return da - db;
  });
  container.innerHTML = sorted.map(cd => {
    const target = new Date(cd.date + 'T00:00:00');
    const diff = Math.round((target - today) / 86400000);
    const statusClass = diff < 0 ? 'passed' : '';
    const statusText = diff > 0 ? `还有 ${diff} 天` : diff === 0 ? '就是今天！' : `已过 ${Math.abs(diff)} 天`;
    const dateFormatted = cd.date.replace(/-/g, '/');
    return `<div class="countdown-card">
      <div class="countdown-days">${Math.abs(diff)}<span class="unit">天</span></div>
      <div class="countdown-info">
        <div class="countdown-name">${escapeHtml(cd.name)}</div>
        <div class="countdown-date">${dateFormatted}</div>
        <div class="countdown-status ${statusClass}">${statusText}</div>
      </div>
      <button class="countdown-delete" data-id="${cd.id}" aria-label="删除">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function openCountdownModal() {
  document.getElementById('countdownModalTitle').textContent = '添加倒计时';
  document.getElementById('countdownNameInput').value = '';
  document.getElementById('countdownDateInput').value = '';
  document.getElementById('countdownModalOverlay').classList.add('show');
  setTimeout(() => { document.getElementById('countdownNameInput').focus(); }, 220);
}

function closeCountdownModal() {
  document.getElementById('countdownModalOverlay').classList.remove('show');
}

function handleCountdownConfirm() {
  const name = document.getElementById('countdownNameInput').value.trim();
  const date = document.getElementById('countdownDateInput').value;
  if (!name) { alert('请输入事件名称'); return; }
  if (!date) { alert('请选择日期'); return; }
  countdowns.push({ id: Date.now().toString(), name, date });
  saveCountdowns();
  renderCountdown();
  closeCountdownModal();
}

function bindCountdownEvents() {
  document.getElementById('countdownAddBtn')?.addEventListener('click', openCountdownModal);
  document.getElementById('countdownModalCancel')?.addEventListener('click', closeCountdownModal);
  document.getElementById('countdownModalConfirm')?.addEventListener('click', handleCountdownConfirm);
  document.getElementById('countdownModalOverlay')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) closeCountdownModal();
  });
  // delete delegation
  document.getElementById('countdownList')?.addEventListener('click', e => {
    const btn = e.target.closest('.countdown-delete');
    if (!btn) return;
    const id = btn.dataset.id;
    if (!confirm('删除这个倒计时？')) return;
    countdowns = countdowns.filter(c => c.id !== id);
    saveCountdowns();
    renderCountdown();
  });
}

// ── Export / Import ──
const importFileInput = document.createElement('input');
importFileInput.type = 'file';
importFileInput.id = 'importFileInput';
importFileInput.accept = '.json';
importFileInput.style.display = 'none';
document.body.appendChild(importFileInput);
importFileInput.addEventListener('change', importData);

function exportData() {
  const today = new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const filename = `learning-tracker-backup-${dateStr}.json`;
  const payload = { tasks, sessions, calendarTasks, countdowns };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setSyncStatus('online', '已导出');
  setTimeout(() => setSyncStatus('online', '已同步'), 2000);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.tasks)) {
        alert('文件格式不对');
        return;
      }
      // Merge tasks: deduplicate by id
      const existingIds = new Set(tasks.map(t => t.id));
      (data.tasks || []).forEach(t => { if (!existingIds.has(t.id)) tasks.push(t); });
      // Deep merge sessions
      for (const dateStr in (data.sessions || {})) {
        if (!sessions[dateStr]) sessions[dateStr] = [];
        const existingSessIds = new Set(sessions[dateStr].map(s => `${s.taskId}-${s.startTime}`));
        (data.sessions[dateStr] || []).forEach(s => {
          if (!existingSessIds.has(`${s.taskId}-${s.startTime}`)) sessions[dateStr].push(s);
        });
      }
      // Deep merge calendarTasks
      for (const dateStr in (data.calendarTasks || {})) {
        if (!calendarTasks[dateStr]) calendarTasks[dateStr] = [];
        const existingCtIds = new Set(calendarTasks[dateStr].map(ct => ct.id));
        (data.calendarTasks[dateStr] || []).forEach(ct => {
          if (!existingCtIds.has(ct.id)) calendarTasks[dateStr].push(ct);
        });
      }
      // Merge countdowns
      const existingCdIds = new Set(countdowns.map(c => c.id));
      (data.countdowns || []).forEach(c => { if (!existingCdIds.has(c.id)) countdowns.push(c); });
      saveCountdowns();
      saveLocal();
      saveCalendarTasks();
      // Sync to cloud if online
      if (navigator.onLine && user) { fullSync(); }
      renderCalendar();
      renderCalendarTasks();
      renderGrid();
      renderCountdown();
      setSyncStatus('online', '已导入');
      setTimeout(() => setSyncStatus('online', '已同步'), 2000);
    } catch {
      alert('文件格式不对');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// Init
checkSession();

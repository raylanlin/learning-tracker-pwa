<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f7f9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#15151a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>学习追踪</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    /* ============================================================
       学习追踪 — v5 polish
       - softer palette, tighter spacing system, unified motion
       - auto dark mode (prefers-color-scheme)
       - press feedback on all interactive surfaces
       ============================================================ */
    :root {
      /* neutrals */
      --bg: #f7f7f9;
      --bg-elev: #eceef2;
      --card: #ffffff;
      --border: #ececf0;
      --border-strong: #dcdce3;

      /* text */
      --text-primary: #1c1c1e;
      --text-secondary: #8a8a92;
      --text-tertiary: #b4b4bc;

      /* brand + accents (softer than iOS system) */
      --accent: #4a7dff;
      --accent-soft: #e8efff;
      --accent-ink: #2d5fe0;
      --green: #3ec177;
      --green-soft: #e2f5ea;
      --yellow: #f5b740;
      --yellow-soft: #fff4dc;
      --purple: #a668e0;
      --purple-soft: #f1e7fb;
      --red: #e5564b;
      --red-soft: #fde9e7;
      --orange: #ef8a3d;

      /* grid cell neutral */
      --cell-pending: #e9e9ee;

      /* elevation */
      --shadow-sm: 0 1px 2px rgba(20, 20, 30, 0.04), 0 1px 1px rgba(20, 20, 30, 0.03);
      --shadow-md: 0 2px 8px rgba(20, 20, 30, 0.05), 0 1px 2px rgba(20, 20, 30, 0.03);
      --shadow-lg: 0 8px 28px rgba(20, 20, 30, 0.08), 0 2px 6px rgba(20, 20, 30, 0.04);
      --shadow-fab: 0 6px 20px rgba(74, 125, 255, 0.32), 0 2px 6px rgba(74, 125, 255, 0.18);

      /* radius */
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
      --r-pill: 999px;

      /* motion */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --t-fast: 0.15s;
      --t-med: 0.2s;
      --t-slow: 0.32s;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f12;
        --bg-elev: #1c1c21;
        --card: #1a1a1f;
        --border: #26262c;
        --border-strong: #33333a;

        --text-primary: #f2f2f5;
        --text-secondary: #8f8f99;
        --text-tertiary: #5c5c66;

        --accent: #6a94ff;
        --accent-soft: #1d2a4a;
        --accent-ink: #9db7ff;
        --green: #4fcc88;
        --green-soft: #15301f;
        --yellow: #f5b740;
        --yellow-soft: #332811;
        --purple: #b880ea;
        --purple-soft: #2a1c3a;
        --red: #ef685c;
        --red-soft: #3a1a17;

        --cell-pending: #26262c;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.35);
        --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.5);
        --shadow-fab: 0 6px 20px rgba(106, 148, 255, 0.4);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { overscroll-behavior-y: none; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: calc(96px + env(safe-area-inset-bottom));
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input { font-family: inherit; }

    /* ── Auth Screen ─────────────────────────────────── */
    .auth-screen {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 24px;
      background: var(--bg);
    }
    .auth-card {
      background: var(--card); border-radius: 24px;
      padding: 36px 28px 28px;
      width: 100%; max-width: 360px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      border: 1px solid var(--border);
    }
    .auth-logo {
      width: 56px; height: 56px; margin: 0 auto 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-ink) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md);
    }
    .auth-logo svg { width: 28px; height: 28px; }
    .auth-card h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
    .auth-card .auth-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
    .auth-field {
      position: relative; margin-bottom: 10px;
    }
    .auth-card input {
      width: 100%;
      border: 1.5px solid var(--border-strong);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color var(--t-med) var(--ease-out), background var(--t-med) var(--ease-out);
      background: var(--bg-elev);
      color: var(--text-primary);
    }
    .auth-card input::placeholder { color: var(--text-tertiary); }
    .auth-card input:focus {
      border-color: var(--accent);
      background: var(--card);
    }
    .auth-card input.invalid {
      border-color: var(--red);
      animation: shake 0.35s var(--ease-out);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .auth-btn {
      width: 100%; border: none; border-radius: 12px; padding: 13px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff;
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
      margin-top: 6px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .auth-btn:active { transform: scale(0.98); background: var(--accent-ink); }
    .auth-btn[disabled] { opacity: 0.7; cursor: not-allowed; }
    .auth-btn .spin {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .auth-btn.loading .spin { display: inline-block; }
    .auth-btn.loading .label { opacity: 0.9; }
    .auth-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 14px; }
    .auth-error {
      font-size: 12px; color: var(--red);
      min-height: 16px; margin: 2px 2px 8px; text-align: left;
      opacity: 0; transition: opacity var(--t-med) var(--ease-out);
    }
    .auth-error.show { opacity: 1; }

    /* ── Header ─────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: saturate(1.6) blur(20px);
      -webkit-backdrop-filter: saturate(1.6) blur(20px);
      padding: calc(12px + env(safe-area-inset-top)) 20px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid transparent;
      transition: border-color var(--t-med) var(--ease-out);
    }
    header.scrolled { border-bottom-color: var(--border); }
    .header-left { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.2px; }
    .header-date {
      font-size: 13px; color: var(--text-secondary); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .sync-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500;
      padding: 4px 9px; border-radius: var(--r-pill);
      background: var(--bg-elev); color: var(--text-secondary);
      transition: all var(--t-med) var(--ease-out);
    }
    .sync-pill .sync-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    }
    .sync-pill.syncing { color: var(--accent-ink); background: var(--accent-soft); }
    .sync-pill.syncing .sync-dot { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .sync-pill.error { color: var(--red); background: var(--red-soft); }
    .sync-pill.error .sync-dot { background: var(--red); }
    .sync-pill.offline { color: var(--orange); background: var(--yellow-soft); }
    .sync-pill.offline .sync-dot { background: var(--orange); }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-elev); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-secondary);
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
    }
    .icon-btn:active { transform: scale(0.92); background: var(--border-strong); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ── Tab Bar ─────────────────────────────────── */
    .tab-bar {
      display: flex; background: var(--bg-elev);
      border-radius: var(--r-md);
      margin: 10px 16px 14px;
      padding: 3px;
      position: relative;
    }
    .tab-btn {
      flex: 1; padding: 8px 0; border: none; background: transparent;
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      cursor: pointer;
      border-radius: 9px;
      transition: color var(--t-med) var(--ease-out);
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      z-index: 1;
    }
    .tab-btn.active { color: var(--text-primary); }
    .tab-indicator {
      position: absolute; top: 3px; bottom: 3px;
      width: calc(50% - 3px);
      background: var(--card);
      border-radius: 9px;
      box-shadow: var(--shadow-sm);
      transition: transform var(--t-slow) var(--ease-out);
    }
    .tab-indicator[data-tab="grid"] { transform: translateX(100%); }
    .tab-btn svg { width: 14px; height: 14px; }

    /* ── Container ─────────────────────────────────── */
    .container { max-width: 560px; margin: 0 auto; padding: 0 16px; }
    .tab-page { display: none; animation: fadeInUp 0.25s var(--ease-out); }
    .tab-page.active { display: block; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Calendar ─────────────────────────────────── */
    .calendar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 2px 10px;
    }
    .calendar-header h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
    .cal-nav {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-elev); border: none;
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
    }
    .cal-nav:active { transform: scale(0.9); background: var(--border-strong); }
    .cal-nav svg { width: 14px; height: 14px; }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      text-align: center; font-size: 11px; color: var(--text-tertiary);
      padding: 6px 0; font-weight: 600; letter-spacing: 0.4px;
    }
    .cal-days {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 10px;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: background var(--t-fast) var(--ease-out), transform var(--t-fast) var(--ease-out);
      color: var(--text-primary);
    }
    .cal-day:active { transform: scale(0.92); background: var(--bg-elev); }
    .cal-day.other-month { color: var(--text-tertiary); }
    .cal-day.today {
      background: var(--accent-soft);
      color: var(--accent-ink);
      font-weight: 700;
    }
    .cal-day.selected {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .cal-day.today.selected { background: var(--accent); color: #fff; }
    .cal-day .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--green);
      position: absolute; bottom: 5px;
    }
    .cal-day.today .dot { background: var(--accent); }
    .cal-day.selected .dot { background: #fff; }

    /* ── Day Detail ─────────────────────────────────── */
    .day-detail {
      background: var(--card);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      margin-top: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .day-detail-header {
      padding: 14px 16px;
      font-size: 14px; font-weight: 600;
      display: flex; align-items: center; justify-content: space-between;
      color: var(--text-secondary);
      letter-spacing: 0.1px;
    }
    .day-detail-header .date-label {
      color: var(--text-primary); font-weight: 600; font-size: 15px;
    }
    .day-detail-header .date-count {
      font-size: 12px; font-weight: 500;
      padding: 2px 8px; border-radius: var(--r-pill);
      background: var(--bg-elev);
    }
    .calendar-task-list {
      border-top: 1px solid var(--border);
    }
    .calendar-task-list:empty { display: none; }
    .calendar-task-item {
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.25s var(--ease-out);
    }
    .calendar-task-item:last-child { border-bottom: none; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .calendar-task-checkbox {
      display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer;
      min-width: 0;
    }
    .cb {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.8px solid var(--border-strong);
      flex-shrink: 0;
      position: relative;
      transition: all var(--t-med) var(--ease-out);
      display: flex; align-items: center; justify-content: center;
    }
    .cb svg { width: 12px; height: 12px; opacity: 0; transform: scale(0.6); transition: all var(--t-med) var(--ease-spring); color: #fff; }
    .calendar-task-checkbox input { display: none; }
    .calendar-task-checkbox input:checked + .cb {
      background: var(--green); border-color: var(--green);
    }
    .calendar-task-checkbox input:checked + .cb svg { opacity: 1; transform: scale(1); }
    .calendar-task-name {
      font-size: 15px; font-weight: 500;
      transition: all var(--t-med) var(--ease-out);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .calendar-task-name.done {
      color: var(--text-tertiary); text-decoration: line-through;
    }
    .calendar-task-delete {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: transparent; color: var(--text-tertiary);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t-fast) var(--ease-out);
      flex-shrink: 0;
    }
    .calendar-task-delete:hover { background: var(--red-soft); color: var(--red); }
    .calendar-task-delete:active { transform: scale(0.88); }
    .calendar-task-delete svg { width: 12px; height: 12px; }
    .add-inline-btn {
      display: flex; width: 100%; padding: 12px 16px;
      background: transparent; border: none;
      border-top: 1px solid var(--border);
      color: var(--accent);
      font-size: 14px; font-weight: 600; cursor: pointer;
      align-items: center; justify-content: center; gap: 6px;
      transition: background var(--t-fast) var(--ease-out);
    }
    .add-inline-btn:active { background: var(--bg-elev); }
    .add-inline-btn svg { width: 14px; height: 14px; }

    .day-empty {
      padding: 28px 16px; text-align: center;
      color: var(--text-tertiary); font-size: 13px;
    }

    /* ── Task Cards ─────────────────────────────────── */
    .task-card {
      background: var(--card);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      transition: box-shadow var(--t-med) var(--ease-out);
    }
    .task-card.open { box-shadow: var(--shadow-lg); }
    .task-header {
      padding: 14px 16px;
      display: flex; align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background var(--t-fast) var(--ease-out);
    }
    .task-header:active { background: var(--bg-elev); }
    .task-info { flex: 1; min-width: 0; }
    .task-name {
      font-size: 16px; font-weight: 600; letter-spacing: -0.1px;
      margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .task-meta {
      font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .task-meta .count { font-weight: 600; color: var(--text-primary); }
    .task-meta .sep { color: var(--text-tertiary); }
    .task-meta .tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 7px; border-radius: var(--r-pill);
      font-size: 11px; font-weight: 600;
    }
    .task-meta .tag.today { background: var(--yellow-soft); color: #b07a14; }
    .task-meta .tag.bonus { background: var(--purple-soft); color: var(--purple); }
    .progress-bar-wrap {
      width: 72px; height: 4px; background: var(--cell-pending);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--green); border-radius: 2px;
      transition: width 0.4s var(--ease-out);
    }
    .task-arrow {
      width: 18px; height: 18px; margin-left: 10px;
      transition: transform var(--t-slow) var(--ease-spring);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .task-card.open .task-arrow { transform: rotate(180deg); color: var(--text-secondary); }
    .task-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s var(--ease-out);
    }
    .task-card.open .task-body { max-height: 4000px; }
    .task-body-inner { padding: 0 16px 16px; }

    /* ── Legend (compact hint strip) ─────────────────────── */
    .legend-strip {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 8px 10px; margin-bottom: 10px;
      background: var(--bg-elev); border-radius: var(--r-md);
      font-size: 11px; color: var(--text-secondary);
      align-items: center;
    }
    .legend-item {
      display: inline-flex; align-items: center; gap: 5px;
    }
    .legend-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-hint {
      flex-basis: 100%; font-size: 11px; color: var(--text-tertiary);
      padding-top: 4px; border-top: 1px dashed var(--border-strong); margin-top: 2px;
    }

    /* ── Grid ─────────────────────────────────── */
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .cell {
      aspect-ratio: 1; border-radius: 10px;
      cursor: pointer; position: relative;
      transition: transform var(--t-fast) var(--ease-spring), background var(--t-med) var(--ease-out), box-shadow var(--t-med) var(--ease-out);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
      overflow: hidden;
    }
    .cell:active { transform: scale(0.88); }
    .cell.pending {
      background: var(--cell-pending);
      color: var(--text-tertiary);
    }
    .cell.done {
      background: var(--green);
      color: #fff;
    }
    .cell.today {
      background: var(--yellow);
      color: #4d3a08;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--yellow) 30%, transparent);
      animation: pop 0.32s var(--ease-spring);
    }
    .cell.bonus {
      background: var(--purple);
      color: #fff;
    }
    @keyframes pop {
      0% { transform: scale(0.6); }
      60% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* ── Subtask ─────────────────────────────────── */
    .subtasks-section { margin-top: 10px; }
    .subtask-item {
      background: var(--bg-elev);
      border-radius: var(--r-md);
      padding: 10px 12px;
      margin-bottom: 8px;
      transition: box-shadow var(--t-med) var(--ease-out);
    }
    .subtask-item.open {
      background: var(--card);
      box-shadow: inset 0 0 0 1px var(--border);
    }
    .subtask-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      gap: 8px;
    }
    .subtask-name {
      font-size: 14px; font-weight: 600; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .subtask-meta {
      font-size: 11px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .subtask-progress-wrap {
      width: 40px; height: 3px; background: var(--cell-pending);
      border-radius: 2px; overflow: hidden;
    }
    .subtask-progress-fill {
      height: 100%; background: var(--green); border-radius: 2px;
      transition: width 0.4s var(--ease-out);
    }
    .subtask-arrow {
      width: 14px; height: 14px;
      transition: transform var(--t-slow) var(--ease-spring);
      color: var(--text-tertiary); flex-shrink: 0;
    }
    .subtask-item.open .subtask-arrow { transform: rotate(180deg); }
    .subtask-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s var(--ease-out);
    }
    .subtask-item.open .subtask-body { max-height: 800px; }
    .subtask-body-inner { padding: 12px 0 4px; }
    .subtask-body .grid { gap: 6px; }
    .subtask-body .cell { border-radius: 8px; font-size: 9px; }

    /* ── Quick add chips (today +1/+5/+10) ─────────────── */
    .quick-chips {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    }
    .chip {
      flex: 1; min-width: 0;
      padding: 8px 10px;
      background: var(--yellow-soft);
      color: #8a600a;
      border: none;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: transform var(--t-fast) var(--ease-spring), background var(--t-fast) var(--ease-out);
    }
    .chip:active { transform: scale(0.95); }
    .chip:hover { background: color-mix(in srgb, var(--yellow-soft) 80%, var(--yellow)); }

    .subtask-actions {
      display: flex; gap: 6px; margin-top: 10px;
    }
    .mini-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      font-size: 12px; font-weight: 500;
      padding: 7px 10px; border-radius: 8px;
      cursor: pointer;
      transition: all var(--t-fast) var(--ease-out);
    }
    .mini-btn:active { transform: scale(0.96); }
    .mini-btn.danger { color: var(--red); }
    .mini-btn.danger:hover { background: var(--red-soft); border-color: var(--red); }

    .task-card-footer {
      display: flex; gap: 8px;
      padding-top: 12px;
      margin-top: 12px;
      border-top: 1px solid var(--border);
    }
    .add-subtask-btn {
      flex: 1;
      padding: 10px;
      background: var(--accent-soft);
      border: none;
      border-radius: 10px;
      color: var(--accent-ink);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
    }
    .add-subtask-btn:active { transform: scale(0.98); }
    .delete-task-btn {
      padding: 10px 14px;
      background: transparent;
      border: none;
      color: var(--red);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: background var(--t-fast) var(--ease-out);
    }
    .delete-task-btn:hover { background: var(--red-soft); }

    /* ── FAB ─────────────────────────────────── */
    .fab-group {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%); z-index: 200;
    }
    .fab {
      border: none; border-radius: var(--r-pill);
      padding: 14px 24px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff;
      box-shadow: var(--shadow-fab);
      transition: transform var(--t-fast) var(--ease-spring), box-shadow var(--t-med) var(--ease-out);
      display: flex; align-items: center; gap: 7px;
    }
    .fab:active {
      transform: translateX(-50%) scale(0.94);
      box-shadow: 0 3px 10px rgba(74, 125, 255, 0.35);
    }
    .fab-group.fab-group-wrapper { transform: translateX(-50%); }
    .fab-group.fab-group-wrapper .fab { transform: none; }
    .fab-group.fab-group-wrapper .fab:active { transform: scale(0.94); }

    /* ── Modal ─────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 10, 20, 0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity var(--t-med) var(--ease-out);
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border-radius: var(--r-xl);
      width: 100%; max-width: 360px; padding: 22px 20px 18px;
      transform: scale(0.92) translateY(14px);
      transition: transform var(--t-slow) var(--ease-spring);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
    }
    .modal-overlay.show .modal { transform: scale(1) translateY(0); }
    .modal h2 {
      font-size: 17px; font-weight: 700; text-align: center;
      margin-bottom: 16px; letter-spacing: -0.2px;
    }
    .modal input {
      width: 100%;
      border: 1.5px solid var(--border-strong);
      border-radius: 12px;
      padding: 12px 14px; font-size: 15px; outline: none;
      transition: border-color var(--t-med) var(--ease-out), background var(--t-med) var(--ease-out);
      background: var(--bg-elev);
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .modal input:focus {
      border-color: var(--accent);
      background: var(--card);
    }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns button {
      flex: 1; padding: 12px;
      border-radius: 12px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: transform var(--t-fast) var(--ease-out), background var(--t-fast) var(--ease-out);
    }
    .modal-btns button:active { transform: scale(0.97); }
    .btn-cancel { background: var(--bg-elev); color: var(--text-primary); }
    .btn-cancel:hover { background: var(--border-strong); }
    .btn-confirm { background: var(--accent); color: #fff; }
    .btn-confirm:hover { background: var(--accent-ink); }

    /* ── Empty state ─────────────────────────────────── */
    .empty-hint {
      text-align: center;
      padding: 80px 20px 40px;
      color: var(--text-tertiary);
    }
    .empty-hint .empty-art {
      width: 72px; height: 72px; margin: 0 auto 16px;
      background: var(--bg-elev);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
    }
    .empty-hint .empty-art svg { width: 32px; height: 32px; }
    .empty-hint .empty-title {
      font-size: 16px; font-weight: 600; color: var(--text-primary);
      margin-bottom: 4px;
    }
    .empty-hint .empty-sub { font-size: 13px; color: var(--text-secondary); }

    /* ── Loading Overlay ─────────────────────── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(10px);
      z-index: 400;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px;
      opacity: 0; pointer-events: none;
      transition: opacity var(--t-med) var(--ease-out);
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .loading-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-secondary); }

    /* ── Toast ─────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(96px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: color-mix(in srgb, var(--text-primary) 92%, transparent);
      color: var(--bg);
      font-size: 13px; font-weight: 500;
      padding: 10px 16px;
      border-radius: var(--r-pill);
      z-index: 450;
      opacity: 0; pointer-events: none;
      transition: all var(--t-slow) var(--ease-spring);
      max-width: calc(100% - 40px);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Reduced motion ─────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<!-- Auth Screen -->

<!-- Main App -->
<div id="mainApp" style="display:none;">

          <svg viewBox="0 0 24 24" fill="none"><path d="M4 19V6a2 2 0 0 1 2-2h10l4 4v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>

<script>
// ============================================================
// 学习追踪 — v5 (polished)
// Data layer: identical Supabase contract as v4 (safe to drop-in)
// ============================================================

// ── Supabase ──
const SUPABASE_URL = 'https://wpwlbulloksrspbpclmt.supabase.co';
const SUPABASE_ANON = 'sb_publishable_fXJKvM-vxOvXb-yFntMXdw_JU0DCjKJ';
const API = SUPABASE_URL + '/rest/v1';
const AUTH = SUPABASE_URL + '/auth/v1';

const USER_ACCOUNTS = {
  'raylan': { email: 'raylan@learningtracker.app', name: 'Raylan' },
  'scarlett': { email: 'scarlett@learningtracker.app', name: 'Scarlett' },
};

const STORAGE_KEY = 'learning_tracker_v5';
const TARGET = 30;
const GRID_SIZE = 60;

let sessionToken = null;
let sessionUser = null;
let user = null;
let tasks = [];
let sessions = {};
let calendarTasks = {};
let todayKey = '';
let selectedDate = '';
let calYear = 0, calMonth = 0;
let currentModalMode = '';
let currentModalTaskId = '';
let cardOpenState = {};
let syncDebounceTimer = null;

// Restore session
try {
  const saved = localStorage.getItem('lt_session');
  if (saved) {
    const s = JSON.parse(saved);
    if (s.expires_at && s.expires_at > Date.now()) {
      sessionToken = s.access_token;
      sessionUser = s.user;
    } else {
      localStorage.removeItem('lt_session');
    }
  }
} catch { /* ignore */ }

// ── API ──
async function apiLogin(email, password) {
  const res = await fetch(AUTH + '/token?grant_type=password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', apikey: SUPABASE_ANON },
    body: JSON.stringify({ email, password })
  });
  if (!res.ok) throw new Error('Login failed');
  return await res.json();
}

async function apiLoadData(userId) {
  const res = await fetch(API + '/learning_tracker_data?user_id=eq.' + userId + '&limit=1', {
    headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + sessionToken }
  });
  if (!res.ok) throw new Error('Load failed');
  const data = await res.json();
  return data[0] || null;
}

async function apiSaveData(userId, payload) {
  const res = await fetch(API + '/learning_tracker_data', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: SUPABASE_ANON,
      Authorization: 'Bearer ' + sessionToken,
      Prefer: 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ user_id: userId, ...payload })
  });
  if (!res.ok) throw new Error('Save failed: ' + (await res.text()));
  const text = await res.text();
  return text ? JSON.parse(text) : {};
}

// ── Auth ──
async function checkSession() {
  if (sessionToken && sessionUser) {
    user = sessionUser;
    showApp();
    await loadFromCloud();
    initApp();
  } else {
    showAuth();
    setTimeout(() => document.getElementById('authUser').focus(), 200);
  }
}

function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

function setAuthError(msg) {
  const errEl = document.getElementById('authError');
  errEl.textContent = msg;
  errEl.classList.toggle('show', !!msg);
}

function setInputInvalid(id, invalid) {
  document.getElementById(id).classList.toggle('invalid', !!invalid);
}

document.getElementById('authLoginBtn').addEventListener('click', async () => {
  const userEl = document.getElementById('authUser');
  const passEl = document.getElementById('authPass');
  const username = userEl.value.trim().toLowerCase();
  const password = passEl.value;
  const btn = document.getElementById('authLoginBtn');

  setInputInvalid('authUser', false);
  setInputInvalid('authPass', false);

  if (!username) { setAuthError('请输入账号'); setInputInvalid('authUser', true); return; }
  if (!password) { setAuthError('请输入密码'); setInputInvalid('authPass', true); return; }

  const account = USER_ACCOUNTS[username];
  if (!account) {
    setAuthError('账号不存在');
    setInputInvalid('authUser', true);
    return;
  }

  setAuthError('');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.querySelector('.label').textContent = '登录中';

  try {
    const data = await apiLogin(account.email, password);
    sessionToken = data.access_token;
    sessionUser = data.user;
    user = data.user;
    localStorage.setItem('lt_session', JSON.stringify({
      access_token: data.access_token,
      user: data.user,
      expires_at: Date.now() + data.expires_in * 1000
    }));
    showApp();
    loadFromCloud().then(() => initApp());
  } catch (e) {
    setAuthError('密码错误,请重试');
    setInputInvalid('authPass', true);
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.querySelector('.label').textContent = '登录';
  }
});

document.getElementById('authPass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('authLoginBtn').click();
});
document.getElementById('authUser').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('authPass').focus();
});
document.getElementById('authUser').addEventListener('input', () => {
  setInputInvalid('authUser', false); setAuthError('');
});
document.getElementById('authPass').addEventListener('input', () => {
  setInputInvalid('authPass', false); setAuthError('');
});

// ── Cloud Sync ──
async function loadFromCloud() {
  if (!user) return;
  showLoading('正在加载…');
  try {
    const row = await apiLoadData(user.id);
    if (row && row.tasks) {
      tasks = row.tasks;
      sessions = row.sessions || {};
      calendarTasks = row.calendar_tasks || {};
    } else {
      // fallback to local cache
      try {
        const localRaw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('learning_tracker_v4');
        if (localRaw) {
          const local = JSON.parse(localRaw);
          tasks = local.tasks || [];
          sessions = local.sessions || {};
          calendarTasks = local.calendar_tasks || {};
          setTimeout(saveToCloud, 3000);
        }
      } catch { /* ignore */ }
    }
  } catch (e) {
    console.error('Cloud load failed:', e);
    try {
      const localRaw = localStorage.getItem(STORAGE_KEY);
      if (localRaw) {
        const local = JSON.parse(localRaw);
        tasks = local.tasks || [];
        sessions = local.sessions || {};
        calendarTasks = local.calendar_tasks || {};
      }
    } catch { /* ignore */ }
  } finally {
    hideLoading();
  }
}

async function saveToCloud() {
  if (!user) return;
  setSyncStatus('syncing', '同步中');
  try {
    await apiSaveData(user.id, { tasks, sessions, calendar_tasks: calendarTasks });
    setSyncStatus('online', '已同步');
  } catch (e) {
    console.error('Cloud save failed:', e);
    setSyncStatus('error', '同步失败');
  }
}

function debouncedCloudSave() {
  if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => saveToCloud(), 1500);
}

function saveLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, sessions, calendar_tasks: calendarTasks }));
  } catch {}
  debouncedCloudSave();
}

// ── Init ──
function initApp() {
  todayKey = getTodayKey();
  selectedDate = todayKey;
  calYear = new Date().getFullYear();
  calMonth = new Date().getMonth();
  renderHeaderDate();
  renderCalendar();
  renderGrid();
  bindEvents();
  setInterval(checkDayChange, 60000);

  // scroll shadow on header
  window.addEventListener('scroll', () => {
    document.getElementById('appHeader').classList.toggle('scrolled', window.scrollY > 4);
  }, { passive: true });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

// ── Utils ──
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateCN(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${d.getMonth()+1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderHeaderDate() {
  document.getElementById('headerDate').textContent = formatDateCN(todayKey);
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '正在同步…';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function setSyncStatus(type, text) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-pill ' + (type === 'online' ? '' : type);
  document.getElementById('syncLabel').textContent = text;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

function haptic() {
  if (navigator.vibrate) navigator.vibrate(10);
}

// ── Calendar ──
function renderCalendar() {
  const title = document.getElementById('calTitle');
  title.textContent = `${calYear}年${calMonth + 1}月`;
  const container = document.getElementById('calDays');
  container.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  for (let i = firstDay - 1; i >= 0; i--) {
    const div = document.createElement('div');
    div.className = 'cal-day other-month';
    div.textContent = prevDays - i;
    container.appendChild(div);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const div = document.createElement('div');
    div.className = 'cal-day';
    div.textContent = d;
    if (dateStr === todayKey) div.classList.add('today');
    if (dateStr === selectedDate) div.classList.add('selected');
    const hasSessions = sessions[dateStr] && sessions[dateStr].length > 0;
    const hasCalTasks = calendarTasks[dateStr] && calendarTasks[dateStr].some(ct => ct.done);
    if (hasSessions || hasCalTasks) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      div.appendChild(dot);
    }
    div.addEventListener('click', () => {
      selectedDate = dateStr;
      renderCalendar();
    });
    container.appendChild(div);
  }
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const div = document.createElement('div');
    div.className = 'cal-day other-month';
    div.textContent = i;
    container.appendChild(div);
  }
  renderCalendarTasks();
}

// ── Day Detail ──
function renderCalendarTasks() {
  const container = document.getElementById('dayDetail');
  const dayCalTasks = calendarTasks[selectedDate] || [];
  const doneCount = dayCalTasks.filter(ct => ct.done).length;
  const total = dayCalTasks.length;

  let html = `
    <div class="day-detail">
      <div class="day-detail-header">
        <span class="date-label">${formatDateCN(selectedDate)}</span>
        ${total > 0 ? `<span class="date-count">${doneCount}/${total}</span>` : ''}
      </div>`;

  if (dayCalTasks.length === 0) {
    html += `<div class="day-empty">今天还没有计划,点下方添加</div>`;
  } else {
    html += `<div class="calendar-task-list">`;
    dayCalTasks.forEach((ct, i) => {
      html += `
        <div class="calendar-task-item">
          <label class="calendar-task-checkbox">
            <input type="checkbox" ${ct.done ? 'checked' : ''} data-ct-check="${selectedDate}|${i}" />
            <span class="cb"><svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5L9.5 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <span class="calendar-task-name ${ct.done ? 'done' : ''}">${escHtml(ct.name)}</span>
          </label>
          <button class="calendar-task-delete" data-ct-del="${selectedDate}|${i}" aria-label="删除">
            <svg viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>`;
    });
    html += `</div>`;
  }
  html += `
      <button class="add-inline-btn" id="addCalTaskBtn">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        添加计划
      </button>
    </div>`;
  container.innerHTML = html;

  document.getElementById('addCalTaskBtn').addEventListener('click', () => openCalendarTaskModal());
  container.querySelectorAll('[data-ct-check]').forEach(el => {
    el.addEventListener('change', () => {
      const [d, i] = el.dataset.ctCheck.split('|');
      toggleCalendarTask(d, parseInt(i));
      haptic();
    });
  });
  container.querySelectorAll('[data-ct-del]').forEach(el => {
    el.addEventListener('click', () => {
      const [d, i] = el.dataset.ctDel.split('|');
      deleteCalendarTask(d, parseInt(i));
    });
  });
}

// ── Grid ──
function renderGrid() {
  const list = document.getElementById('taskList');
  const hint = document.getElementById('emptyHint');
  if (tasks.length === 0) {
    hint.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  hint.style.display = 'none';
  const taskIds = new Set(tasks.map(t => t.id));
  list.querySelectorAll('.task-card').forEach(el => { if (!taskIds.has(el.dataset.id)) el.remove(); });
  tasks.forEach(task => {
    let card = list.querySelector(`.task-card[data-id="${task.id}"]`);
    const isNew = !card;
    if (isNew) {
      card = document.createElement('div');
      card.className = 'task-card';
      card.dataset.id = task.id;
      list.appendChild(card);
    }
    const wasOpen = card.classList.contains('open');
    const oldSubStates = {};
    card.querySelectorAll('.subtask-item.open').forEach(el => { oldSubStates[el.dataset.subIdx] = true; });
    card.innerHTML = buildCardHTML(task);
    if (wasOpen || cardOpenState[task.id]) card.classList.add('open');
    Object.keys(oldSubStates).forEach(idx => {
      const subEl = card.querySelector(`.subtask-item[data-sub-idx="${idx}"]`);
      if (subEl) subEl.classList.add('open');
    });
  });
  bindCardEvents();
}

function buildCardHTML(task) {
  const subtasks = task.subtasks || [];
  let totalDone = 0, totalToday = 0, totalBonus = 0;
  subtasks.forEach(st => {
    st.cells.forEach((c, ci) => {
      if (c.done) {
        totalDone++;
        if (ci >= TARGET) totalBonus++;
        if (c.doneToday) totalToday++;
      }
    });
  });
  const pct = Math.min((totalDone / Math.max(TARGET, 1)) * 100, 100);

  let subtasksHTML = '';
  subtasks.forEach((st, si) => {
    const stDone = st.cells.filter(c => c.done).length;
    const stPct = Math.min((stDone / TARGET) * 100, 100);
    let stCellsHTML = '';
    st.cells.forEach((c, ci) => {
      let cls = 'pending';
      if (c.done) {
        if (ci >= TARGET) cls = 'bonus';
        else if (c.doneToday) cls = 'today';
        else cls = 'done';
      }
      stCellsHTML += `<div class="cell ${cls}" data-task="${task.id}" data-sub="${si}" data-cell="${ci}">${ci+1}</div>`;
    });
    subtasksHTML += `
      <div class="subtask-item" data-sub-idx="${si}">
        <div class="subtask-header" data-sub-toggle="${task.id}-${si}">
          <span class="subtask-name">${escHtml(st.name)}</span>
          <div class="subtask-meta">
            <span>${stDone}/${TARGET}</span>
            <div class="subtask-progress-wrap"><div class="subtask-progress-fill" style="width:${stPct}%"></div></div>
          </div>
          <svg class="subtask-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="subtask-body">
          <div class="subtask-body-inner">
            <div class="grid">${stCellsHTML}</div>
            <div class="quick-chips">
              <button class="chip" data-quick="${task.id}|${si}|1">+1 打卡</button>
              <button class="chip" data-quick="${task.id}|${si}|5">+5</button>
              <button class="chip" data-quick="${task.id}|${si}|10">+10</button>
            </div>
            <div class="subtask-actions">
              <button class="mini-btn" data-undo="${task.id}|${si}">撤销今日最后一格</button>
              <button class="mini-btn danger" data-del-sub="${task.id}-${si}">删除子任务</button>
            </div>
          </div>
        </div>
      </div>`;
  });

  const metaTags = [];
  if (totalToday > 0) metaTags.push(`<span class="tag today">●${totalToday} 今日</span>`);
  if (totalBonus > 0) metaTags.push(`<span class="tag bonus">+${totalBonus} 超额</span>`);

  const legendHTML = `
    <div class="legend-strip">
      <span class="legend-item"><span class="legend-dot" style="background:var(--cell-pending)"></span>未完成</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>已完成</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--yellow)"></span>今日</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--purple)"></span>超额</span>
      <div class="legend-hint">点格子打卡 · 长按撤销今日最后一格</div>
    </div>`;

  return `
    <div class="task-header" data-task-toggle="${task.id}">
      <div class="task-info">
        <div class="task-name">${escHtml(task.name)}</div>
        <div class="task-meta">
          <span class="count">${totalDone}</span><span class="sep">/ ${TARGET}</span>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <span class="sep">· ${subtasks.length} 个子任务</span>
          ${metaTags.join('')}
        </div>
      </div>
      <svg class="task-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="task-body">
      <div class="task-body-inner">
        ${legendHTML}
        <div class="subtasks-section">${subtasksHTML || '<div style="padding:8px 4px 4px;font-size:13px;color:var(--text-tertiary);">还没有子任务,点下方按钮添加</div>'}</div>
        <div class="task-card-footer">
          <button class="add-subtask-btn" data-add-sub="${task.id}">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            添加子任务
          </button>
          <button class="delete-task-btn" data-del-task="${task.id}">删除</button>
        </div>
      </div>
    </div>`;
}

function bindCardEvents() {
  document.querySelectorAll('[data-task-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.taskToggle;
      const card = el.closest('.task-card');
      cardOpenState[id] = !cardOpenState[id];
      card.classList.toggle('open', cardOpenState[id]);
    });
  });
  document.querySelectorAll('[data-sub-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      el.closest('.subtask-item').classList.toggle('open');
    });
  });
  document.querySelectorAll('.cell').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      addProgress(el.dataset.task, parseInt(el.dataset.sub));
      haptic();
    });
    let timer;
    const startLong = () => {
      timer = setTimeout(() => {
        undoLastYellow(el.dataset.task, parseInt(el.dataset.sub));
        haptic();
        toast('已撤销今日最后一格');
      }, 550);
    };
    el.addEventListener('touchstart', startLong, { passive: true });
    el.addEventListener('touchend', () => clearTimeout(timer));
    el.addEventListener('touchmove', () => clearTimeout(timer));
    el.addEventListener('mousedown', startLong);
    el.addEventListener('mouseup', () => clearTimeout(timer));
    el.addEventListener('mouseleave', () => clearTimeout(timer));
  });
  document.querySelectorAll('[data-quick]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const [taskId, subIdx, n] = el.dataset.quick.split('|');
      for (let i = 0; i < parseInt(n); i++) addProgress(taskId, parseInt(subIdx), false);
      saveLocal(); renderGrid(); renderCalendar();
      haptic();
      toast(`+${n} 已打卡`);
    });
  });
  document.querySelectorAll('[data-undo]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const [taskId, subIdx] = el.dataset.undo.split('|');
      undoLastYellow(taskId, parseInt(subIdx));
      toast('已撤销');
    });
  });
  document.querySelectorAll('[data-add-sub]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openSubtaskModal(el.dataset.addSub); });
  });
  document.querySelectorAll('[data-del-sub]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const parts = el.dataset.delSub.split('-');
      const subIdxStr = parts.pop();
      const taskIdd = parts.join('-');
      if (confirm('确定删除这个子任务?')) deleteSubtask(taskIdd, parseInt(subIdxStr));
    });
  });
  document.querySelectorAll('[data-del-task]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('确定删除这个任务?')) deleteTask(el.dataset.delTask);
    });
  });
}

function addProgress(taskId, subIdx, persist = true) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks[subIdx]) return;
  const sub = task.subtasks[subIdx];
  for (let i = 0; i < sub.cells.length; i++) {
    if (!sub.cells[i].done) {
      sub.cells[i].done = true;
      sub.cells[i].doneToday = true;
      break;
    }
  }
  if (persist) {
    saveLocal(); renderGrid(); renderCalendar();
  }
}

function undoLastYellow(taskId, subIdx) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks[subIdx]) return;
  const sub = task.subtasks[subIdx];
  for (let i = sub.cells.length - 1; i >= 0; i--) {
    if (sub.cells[i].doneToday) {
      sub.cells[i].done = false;
      sub.cells[i].doneToday = false;
      break;
    }
  }
  saveLocal(); renderGrid(); renderCalendar();
}

// ── Calendar Tasks ──
function openCalendarTaskModal() {
  currentModalMode = 'add-calendar-task';
  document.getElementById('modalTitle').textContent = '添加计划';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="今天要做什么…" maxlength="50" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) inp.focus(); }, 220);
}
function addCalendarTask(name) {
  if (!calendarTasks[selectedDate]) calendarTasks[selectedDate] = [];
  calendarTasks[selectedDate].push({ id: Date.now().toString(), name, done: false });
  saveLocal(); renderCalendar(); renderCalendarTasks();
}
function toggleCalendarTask(date, idx) {
  if (calendarTasks[date] && calendarTasks[date][idx]) {
    calendarTasks[date][idx].done = !calendarTasks[date][idx].done;
    saveLocal(); renderCalendar(); renderCalendarTasks();
  }
}
function deleteCalendarTask(date, idx) {
  if (calendarTasks[date]) {
    calendarTasks[date].splice(idx, 1);
    if (calendarTasks[date].length === 0) delete calendarTasks[date];
    saveLocal(); renderCalendar(); renderCalendarTasks();
  }
}

// ── Task CRUD ──
function addTask(name) {
  const id = Date.now().toString();
  tasks.push({ id, name, subtasks: [], _lastDate: todayKey });
  cardOpenState[id] = true;
  saveLocal(); renderGrid(); renderCalendar();
  toast('已添加任务');
}
function addSubtask(taskId, name) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!task.subtasks) task.subtasks = [];
  task.subtasks.push({
    id: `st-${Date.now()}`,
    name,
    cells: Array(GRID_SIZE).fill(null).map(() => ({ done: false, doneToday: false, bonus: false }))
  });
  cardOpenState[taskId] = true;
  saveLocal(); renderGrid();
  toast('已添加子任务');
}
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  delete cardOpenState[id];
  saveLocal(); renderGrid();
}
function deleteSubtask(taskId, subIdx) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || !task.subtasks[subIdx]) return;
  task.subtasks.splice(subIdx, 1);
  saveLocal(); renderGrid();
}

function checkDayChange() {
  const current = getTodayKey();
  if (current !== todayKey) {
    todayKey = current;
    renderHeaderDate();
  }
  if (tasks.length > 0 && tasks[0]._lastDate !== current) {
    tasks.forEach(t => {
      if (t.subtasks) {
        t.subtasks.forEach(st => { st.cells.forEach(c => { c.doneToday = false; }); });
      }
      t._lastDate = current;
    });
    saveLocal(); renderGrid(); renderCalendar();
  }
}

// ── Modals ──
function openTaskModal() {
  currentModalMode = 'add-task';
  document.getElementById('modalTitle').textContent = '新建任务';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="任务名称,例如:英语阅读" maxlength="30" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) inp.focus(); }, 220);
}
function openSubtaskModal(taskId) {
  currentModalMode = 'add-subtask';
  currentModalTaskId = taskId;
  document.getElementById('modalTitle').textContent = '添加子任务';
  document.getElementById('modalContent').innerHTML = `<input type="text" id="modalInput" placeholder="子任务名称,例如:精读文章" maxlength="30" autocomplete="off" />`;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => { const inp = document.getElementById('modalInput'); if (inp) inp.focus(); }, 220);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function handleModalConfirm() {
  const input = document.getElementById('modalInput');
  if (!input) return;
  const value = input.value.trim();
  if (!value) { input.focus(); return; }
  switch (currentModalMode) {
    case 'add-task': addTask(value); break;
    case 'add-subtask': addSubtask(currentModalTaskId, value); break;
    case 'add-calendar-task': addCalendarTask(value); break;
  }
  closeModal();
}

// ── Events ──
function bindEvents() {
  const indicator = document.getElementById('tabIndicator');
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab + 'Page').classList.add('active');
      indicator.dataset.tab = btn.dataset.tab;
      updateFabText();
    });
  });

  document.getElementById('calPrev').addEventListener('click', () => {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  });
  document.getElementById('calToday').addEventListener('click', () => {
    const d = new Date();
    calYear = d.getFullYear(); calMonth = d.getMonth();
    selectedDate = todayKey;
    renderCalendar();
  });

  document.getElementById('addBtn').addEventListener('click', () => {
    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
    if (activeTab === 'calendar') openCalendarTaskModal();
    else openTaskModal();
  });

  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalConfirm').addEventListener('click', handleModalConfirm);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('show')) handleModalConfirm();
    if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('show')) closeModal();
  });

  window.addEventListener('online', () => setSyncStatus('online', '已同步'));
  window.addEventListener('offline', () => setSyncStatus('offline', '离线'));

  updateFabText();
}

function updateFabText() {
  const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
  document.getElementById('fabLabel').textContent = activeTab === 'calendar' ? '添加计划' : '添加任务';
}

// Init
checkSession();
</script>
